<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Chat History</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --user: #2563eb;
      --bot: #374151;
      --border: rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 330px 1fr;
      height: 100vh;
    }

    aside {
      background: rgba(17, 24, 39, .92);
      border-right: 1px solid var(--border);
      padding: 18px;
      overflow-y: auto;
    }

    main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: -.02em;
    }

    .pill {
      font-size: 12px;
      color: #082f49;
      background: var(--accent);
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    .search {
      width: 100%;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid var(--border);
      color: var(--text);
      background: #020617;
      outline: none;
      margin-bottom: 14px;
    }

    .chat-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: .15s ease;
    }

    .chat-item:hover,
    .chat-item.active {
      background: var(--panel-2);
      border-color: var(--border);
    }

    .chat-title {
      font-weight: 750;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-date,
    .chat-preview {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .topbar {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 6, 23, .6);
      backdrop-filter: blur(10px);
    }

    .topbar h2 {
      margin: 0 0 4px;
      font-size: 22px;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 760px;
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.45;
      box-shadow: 0 10px 25px rgba(0,0,0,.15);
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot);
      border-bottom-left-radius: 6px;
    }

    .composer {
      padding: 16px 22px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: rgba(2, 6, 23, .72);
    }

    .composer input {
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
    }

    .composer button {
      border: 0;
      background: var(--accent);
      color: #082f49;
      font-weight: 800;
      border-radius: 14px;
      padding: 0 18px;
      cursor: pointer;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      aside { height: 38vh; border-right: 0; border-bottom: 1px solid var(--border); }
      main { height: 62vh; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>Fake Chat History</h1>
        <span class="pill">SPA</span>
      </div>
      <input id="search" class="search" placeholder="Search chats..." />
      <div id="chatList"></div>
    </aside>

    <main>
      <header class="topbar">
        <h2 id="chatTitle">Select a chat</h2>
        <p id="chatMeta">Pick a thread from the left. Totally fake, proudly useful.</p>
      </header>

      <section id="messages" class="messages"></section>

      <form id="composer" class="composer">
        <input id="messageInput" placeholder="Type a fake reply..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script>
    const chats = [
      {
        id: 1,
        title: "K2 Games Ideas",
        date: "Today",
        preview: "Arcade prototypes, ducks, and tiny chaos.",
        messages: [
          { role: "user", text: "Give me a new arcade game idea." },
          { role: "bot", text: "How about Duck Kite Derby: dodge trees, catch wind gusts, and unlock ridiculous hats?" },
          { role: "user", text: "Make it more board-gamey." },
          { role: "bot", text: "Add card-based powerups, a shared wind track, and a risk/reward scoring round." }
        ]
      },
      {
        id: 2,
        title: "Google Sheets Helper",
        date: "Yesterday",
        preview: "Formula fixes and AppSheet dreams.",
        messages: [
          { role: "user", text: "Need a formula to rank games by player count." },
          { role: "bot", text: "Use weighted score = Best * 2 + Recommended - Not Recommended." },
          { role: "user", text: "Can this feed AppSheet?" },
          { role: "bot", text: "Yep. Keep the table flat, stable headers, and avoid merged cells. AppSheet likes boring data. Boring wins." }
        ]
      },
      {
        id: 3,
        title: "BGA Studio Notes",
        date: "Jun 18",
        preview: "Bug reports, reviewers, and production nerves.",
        messages: [
          { role: "user", text: "How do alpha/beta/prod changes work?" },
          { role: "bot", text: "Fix at the current stage, upload, then promote when ready. No need to time-travel unless BGA says so." },
          { role: "user", text: "What should I check before pushing?" },
          { role: "bot", text: "Mobile layout, end-game state, translations, and any hidden card zones trying to escape left." }
        ]
      },
      {
        id: 4,
        title: "3D Print Box",
        date: "Jun 17",
        preview: "OpenSCAD, rounded corners, and cards fitting eventually.",
        messages: [
          { role: "user", text: "Need the K2 Games text on the long side." },
          { role: "bot", text: "Place text on both long lid walls, slightly inset, engraved shallow so the printer does not throw a tantrum." },
          { role: "user", text: "Can we add sizing marks?" },
          { role: "bot", text: "Yes. Add engraved width and height gauges inside the tray for test-card fitting." }
        ]
      }
    ];

    let selectedId = chats[0].id;

    const chatList = document.getElementById("chatList");
    const search = document.getElementById("search");
    const chatTitle = document.getElementById("chatTitle");
    const chatMeta = document.getElementById("chatMeta");
    const messages = document.getElementById("messages");
    const composer = document.getElementById("composer");
    const messageInput = document.getElementById("messageInput");

    function getSelectedChat() {
      return chats.find(chat => chat.id === selectedId);
    }

    function renderChatList() {
      const term = search.value.trim().toLowerCase();
      const filtered = chats.filter(chat =>
        chat.title.toLowerCase().includes(term) ||
        chat.preview.toLowerCase().includes(term) ||
        chat.messages.some(message => message.text.toLowerCase().includes(term))
      );

      chatList.innerHTML = filtered.length ? "" : '<div class="empty">No fake chats found.</div>';

      filtered.forEach(chat => {
        const button = document.createElement("button");
        button.className = "chat-item" + (chat.id === selectedId ? " active" : "");
        button.innerHTML = `
          <div class="chat-title">
            <span>${chat.title}</span>
            <span class="chat-date">${chat.date}</span>
          </div>
          <div class="chat-preview">${chat.preview}</div>
        `;
        button.addEventListener("click", () => {
          selectedId = chat.id;
          render();
        });
        chatList.appendChild(button);
      });
    }

    function renderMessages() {
      const chat = getSelectedChat();
      chatTitle.textContent = chat.title;
      chatMeta.textContent = `${chat.date} · ${chat.messages.length} fake messages`;
      messages.innerHTML = "";

      chat.messages.forEach(message => {
        const bubble = document.createElement("div");
        bubble.className = `message ${message.role}`;
        bubble.textContent = message.text;
        messages.appendChild(bubble);
      });

      messages.scrollTop = messages.scrollHeight;
    }

    function render() {
      renderChatList();
      renderMessages();
    }

    search.addEventListener("input", renderChatList);

    composer.addEventListener("submit", event => {
      event.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      const chat = getSelectedChat();
      chat.messages.push({ role: "user", text });
      chat.messages.push({ role: "bot", text: "Fake reply saved locally until refresh. Very official. ✅" });
      messageInput.value = "";
      render();
    });

    render();
  </script>
</body>
</html>
