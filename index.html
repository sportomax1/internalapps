<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Apps</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <style>
        :root {
            --primary: #007aff;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .apps-grid {
            display: grid;
            gap: 20px;
        }

        .app-card {
            background: var(--surface);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .app-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(0, 122, 255, 0.2);
        }

        .app-icon {
            font-size: 3rem;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, #5856d6 100%);
            border-radius: 16px;
            flex-shrink: 0;
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .app-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--primary);
            transition: transform 0.2s;
        }

        .app-card:hover .arrow {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Internal Apps</h1>
        <p>Secure access to your personal data tools</p>

        <div class="apps-grid">
            <a href="/tracking/" class="app-card">
                <div class="app-icon">📍</div>
                <div class="app-info">
                    <div class="app-name">Activity Tracker</div>
                    <div class="app-desc">View location history and activity patterns</div>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="/oura.html" class="app-card">
                <div class="app-icon">🚀</div>
                <div class="app-info">
                    <div class="app-name">OURA API Explorer</div>
                    <div class="app-desc">Analyze health and sleep data from your OURA ring</div>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
