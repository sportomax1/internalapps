<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Link Saver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f6f8;
    }

    h1 { margin-bottom: 10px; }

    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .card {
      display: flex;
      align-items: center;
      background: white;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      margin-right: 10px;
    }

    .card a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .card button {
      width: auto;
      margin-left: auto;
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h1>🔖 Link Saver</h1>

<input type="text" id="urlInput" placeholder="Paste URL here..." />
<input type="text" id="nameInput" placeholder="Optional custom name..." />
<button onclick="addLink()">Save Link</button>

<div id="linksContainer"></div>

<script>
const STORAGE_KEY = "savedLinks";

function getLinks() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

function saveLinks(links) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
}

async function fetchMetadata(url) {
  try {
    const proxy = "https://api.allorigins.win/raw?url=";
    const response = await fetch(proxy + encodeURIComponent(url));
    const html = await response.text();
    const doc = new DOMParser().parseFromString(html, "text/html");

    const title = doc.querySelector("meta[property='og:title']")?.content ||
                  doc.querySelector("title")?.innerText ||
                  url;

    const image = doc.querySelector("meta[property='og:image']")?.content ||
                  "";

    return { title, image };
  } catch (err) {
    return { title: url, image: "" };
  }
}

async function addLink() {
  const urlInput = document.getElementById("urlInput");
  const nameInput = document.getElementById("nameInput");

  let url = urlInput.value.trim();
  if (!url) return;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  const metadata = await fetchMetadata(url);

  const link = {
    url,
    name: nameInput.value.trim() || metadata.title,
    image: metadata.image
  };

  const links = getLinks();
  links.unshift(link);
  saveLinks(links);

  urlInput.value = "";
  nameInput.value = "";

  renderLinks();
}

function deleteLink(index) {
  const links = getLinks();
  links.splice(index, 1);
  saveLinks(links);
  renderLinks();
}

function renderLinks() {
  const container = document.getElementById("linksContainer");
  const links = getLinks();
  container.innerHTML = "";

  links.forEach((link, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      ${link.image ? `<img src="${link.image}" />` : ""}
      <div>
        <a href="${link.url}" target="_blank">${link.name}</a><br/>
        <small>${link.url}</small>
      </div>
      <button onclick="deleteLink(${index})">X</button>
    `;

    container.appendChild(card);
  });
}

renderLinks();
</script>

</body>
</html>
