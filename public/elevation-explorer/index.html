<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111d"><title>Elevation Explorer</title><style>html,body{margin:0;width:100%;height:100%;background:#07111d;color:#fff;font-family:Inter,system-ui,-apple-system,sans-serif}.boot{height:100%;display:grid;place-items:center;background:radial-gradient(circle at 25% 20%,#183c58 0,transparent 35%),#07111d}.loader{width:42px;height:42px;border:3px solid #ffffff22;border-top-color:#5de2c4;border-radius:50%;animation:spin .8s linear infinite}.boot b{display:block;margin-top:15px}.boot small{display:block;color:#9db1c0;margin-top:4px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div class="boot"><div><div class="loader"></div><b>Elevation Explorer</b><small>Preparing the terrain…</small></div></div><script>
const premiumCSS=`
:root{--accent:#5de2c4;--accent2:#54a8ff;--ink:#f5fbff;--muted:#9fb3c1;--glass:linear-gradient(180deg,rgba(12,30,45,.94),rgba(7,20,32,.88));--line:rgba(255,255,255,.12);--shadow:0 24px 70px rgba(0,0,0,.38)}
*{box-sizing:border-box}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif!important;color:var(--ink)!important;background:#07111d!important}.bar{top:max(12px,env(safe-area-inset-top))!important;left:14px!important;right:14px!important;align-items:center!important}.brand{display:flex!important;align-items:center!important;gap:11px!important;padding:9px 14px 9px 10px!important;border-radius:18px!important;background:var(--glass)!important;border-color:var(--line)!important;box-shadow:var(--shadow)!important}.brand:before{content:'⛰';display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#03211c;font-size:22px;box-shadow:0 10px 24px rgba(93,226,196,.22)}.brand small{color:var(--muted)!important;margin-top:2px}.actions button,.btn{border-color:var(--line)!important;background:rgba(9,25,38,.9)!important;border-radius:13px!important;min-height:42px!important;transition:.18s ease!important}.actions button:hover,.btn:hover{transform:translateY(-1px);border-color:rgba(93,226,196,.55)!important}.btn.primary{background:linear-gradient(135deg,var(--accent),#47bce8)!important;color:#03211c!important;border:0!important;box-shadow:0 10px 24px rgba(93,226,196,.16)}.panel{top:84px!important;left:14px!important;bottom:14px!important;width:376px!important;border-radius:24px!important;background:var(--glass)!important;border-color:var(--line)!important;box-shadow:var(--shadow)!important}.tabs{padding:10px 10px 0!important}.tab{height:46px!important;border-radius:12px 12px 0 0!important;font-size:12px!important}.tab.on{color:var(--accent)!important;background:linear-gradient(180deg,rgba(93,226,196,.12),transparent)!important;box-shadow:inset 0 -2px var(--accent)!important}.scroll{padding:17px!important}.page h2{font-size:11px!important;color:var(--accent)!important;letter-spacing:.14em!important}.muted{color:var(--muted)!important;line-height:1.55!important}.row{gap:8px!important}.result,.point,.preset{border-color:var(--line)!important;border-radius:14px!important;background:rgba(255,255,255,.045)!important;transition:.18s ease!important}.result:hover,.preset:hover{transform:translateY(-2px);border-color:rgba(84,168,255,.58)!important;background:rgba(255,255,255,.07)!important}.preset-grid{gap:8px!important}.range{margin:14px 0!important}.range input{accent-color:var(--accent)}input,select{border-color:var(--line)!important;border-radius:13px!important;background:rgba(255,255,255,.045)!important;outline:none!important}.touch{border-radius:16px!important;border-color:rgba(93,226,196,.28)!important;background:rgba(93,226,196,.07)!important}.stats{gap:8px!important}.stat{border-radius:14px!important;border-color:var(--line)!important;background:rgba(255,255,255,.045)!important;padding:11px!important}.profile{right:14px!important;bottom:14px!important;height:245px!important;border-radius:24px!important;background:var(--glass)!important;border-color:var(--line)!important;box-shadow:var(--shadow)!important}.chart{height:195px!important}pre{background:#030b12!important;border:1px solid var(--line)!important;border-radius:13px!important}.maplibregl-ctrl-group{border-radius:14px!important;overflow:hidden;box-shadow:var(--shadow)!important}.maplibregl-ctrl-bottom-right{bottom:92px!important;right:14px!important}
.ee-welcome{position:absolute;z-index:4;right:14px;top:84px;width:252px;padding:16px;border:1px solid var(--line);border-radius:20px;background:var(--glass);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.ee-welcome h3{font-size:16px;margin:0 0 5px}.ee-welcome p{font-size:11px;line-height:1.5;color:var(--muted);margin:0 0 12px}.ee-quick{display:grid;grid-template-columns:1fr 1fr;gap:7px}.ee-quick button{height:38px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer}.ee-quick button:first-child{background:linear-gradient(135deg,var(--accent),#47bce8);color:#03211c;border:0;font-weight:800}.ee-center{position:absolute;z-index:3;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}.ee-center:before,.ee-center:after{content:'';position:absolute;background:#fff;box-shadow:0 0 0 1px #0005}.ee-center:before{width:28px;height:1px;left:-14px}.ee-center:after{height:28px;width:1px;top:-14px}.ee-readout{position:absolute;z-index:3;left:50%;top:calc(50% + 22px);transform:translateX(-50%);padding:7px 10px;border-radius:11px;background:rgba(5,16,26,.82);border:1px solid var(--line);font-size:11px;pointer-events:none;box-shadow:0 8px 24px #0005}.ee-toast{position:absolute;z-index:30;left:50%;bottom:26px;transform:translate(-50%,20px);opacity:0;padding:10px 14px;border-radius:13px;background:#0d2636;border:1px solid var(--line);box-shadow:var(--shadow);transition:.22s;pointer-events:none}.ee-toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:900px){.ee-welcome{display:none}.panel{width:340px!important}.profile{width:calc(100vw - 382px)!important}}
@media(max-width:800px){.bar{left:9px!important;right:9px!important}.brand{padding:7px 9px!important}.brand:before{width:38px;height:38px;border-radius:12px}.brand small{display:none!important}.actions{gap:6px!important}.actions button{min-height:44px!important;padding:0 11px!important}.panel{left:8px!important;right:8px!important;width:auto!important;bottom:max(72px,env(safe-area-inset-bottom))!important;height:min(64vh,570px)!important;border-radius:23px!important;transform:translateY(calc(100% - 60px))!important}.panel.open{transform:none!important}.tabs{padding-top:13px!important}.profile{left:8px!important;right:8px!important;width:auto!important;bottom:78px!important;height:210px!important}.chart{height:160px!important}.maplibregl-ctrl-bottom-right{bottom:145px!important}.ee-toast{bottom:84px}.ee-readout{font-size:10px}.preset-grid{grid-template-columns:1fr!important}}
`;
const enhancementJS=`
(()=>{const q=s=>document.querySelector(s),qa=s=>[...document.querySelectorAll(s)],toast=m=>{let t=q('.ee-toast');t.textContent=m;t.classList.add('show');clearTimeout(window.__eet);window.__eet=setTimeout(()=>t.classList.remove('show'),1700)};const welcome=document.createElement('section');welcome.className='ee-welcome';welcome.innerHTML='<h3>See the landscape differently</h3><p>Tap anywhere to compare elevations, use two fingers to rotate and tilt, or frame an area for a printable terrain model.</p><div class="ee-quick"><button id="eeAdd">Add center</button><button id="ee3d">Best 3D</button></div>';document.body.append(welcome);const cross=document.createElement('div');cross.className='ee-center';document.body.append(cross);const read=document.createElement('div');read.className='ee-readout';read.textContent='Center elevation —';document.body.append(read);const t=document.createElement('div');t.className='ee-toast';document.body.append(t);const update=()=>{try{const c=map.getCenter(),h=map.queryTerrainElevation([c.lng,c.lat],{exaggerated:false});read.textContent='Center '+(Number.isFinite(h)?Math.round(h*3.28084).toLocaleString()+' ft':'elevation —')}catch(e){}};map.on('move',update);map.on('load',update);q('#eeAdd').onclick=()=>{const c=map.getCenter();add(c.lng,c.lat,'Map center');qa('.tab').find(x=>x.dataset.tab==='compare')?.click();toast('Center added for comparison')};q('#ee3d').onclick=()=>{map.easeTo({pitch:68,bearing:-24,duration:500});q('#pitch').value=68;q('#pv').value='68°';q('#bearing').value=-24;q('#bv').value='-24°';toast('3D terrain view applied')};q('#north').title='Reset map to north';q('#reset').title='Return to Park City';const oldClear=q('#clear').onclick;q('#clear').onclick=()=>{oldClear?.();toast('Comparison points cleared')};const oldMake=q('#make').onclick;q('#make').onclick=()=>{oldMake?.();toast('Generating printable terrain model')};document.addEventListener('keydown',e=>{if(e.key==='/'&&!/input|textarea/i.test(e.target.tagName)){e.preventDefault();q('#search').focus()}if(e.key.toLowerCase()==='n')q('#north').click();if(e.key.toLowerCase()==='r'&&!/input|textarea/i.test(e.target.tagName))q('#reset').click()});if(innerWidth<=800){q('#tools').textContent='Explore';q('.panel').addEventListener('click',e=>{if(e.target.closest('.tab'))q('.panel').classList.add('open')})}toast('Elevation Explorer ready')})();
`;
fetch('../topoforge/index.html',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Unable to load app');return r.text()}).then(html=>{html=html.replaceAll('TopoForge','Elevation Explorer').replaceAll('topoforge','elevation-explorer').replaceAll('forge printable relief models','explore terrain and create printable relief models').replace('</style>','</style><style>'+premiumCSS+'</style>').replace('</body>','<script>'+enhancementJS.replaceAll('</script>','<\\/script>')+'<\\/script></body>');document.open();document.write(html);document.close()}).catch(err=>{document.body.innerHTML='<main style="padding:32px"><h1>Elevation Explorer</h1><p>'+err.message+'</p></main>'});
</script></body></html>
