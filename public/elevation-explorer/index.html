<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Elevation Explorer</title></head><body style="margin:0;background:#07111d;color:white;font-family:system-ui"><script>
fetch('../topoforge/index.html',{cache:'no-store'})
  .then(r=>{if(!r.ok) throw new Error('Unable to load app'); return r.text();})
  .then(html=>{
    html=html.replaceAll('TopoForge','Elevation Explorer').replaceAll('topoforge','elevation-explorer').replaceAll('forge printable relief models','create printable relief models');
    document.open(); document.write(html); document.close();
  })
  .catch(err=>{document.body.innerHTML='<main style="padding:24px"><h1>Elevation Explorer</h1><p>'+err.message+'</p></main>';});
</script></body></html>
