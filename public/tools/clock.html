<!DOCTYPE html>
<html>
<head>
  <title>Denver Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Arial;
      background:#111;
      color:#00ffcc;
      font-size:48px;
    }
  </style>
</head>
<body>
  <div id="clock"></div>

  <script>
    function updateClock() {
      const now = new Date();

      const options = {
        timeZone: "America/Denver",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      };

      const time = new Intl.DateTimeFormat('en-US', options).format(now);
      document.getElementById("clock").textContent = time;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
