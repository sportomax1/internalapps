<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Image Asset Converter</title>
<style>
:root{color-scheme:dark;--panel:#18181b;--panel2:#27272a;--border:#3f3f46;--text:#fafafa;--muted:#a1a1aa;--accent:#3b82f6;--good:#22c55e;--bad:#ef4444}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#172554 0,#09090b 40%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px}.app{width:min(980px,100%);margin:auto}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.back{color:#bfdbfe;text-decoration:none}h1{margin:0;font-size:clamp(1.8rem,4vw,2.5rem)}.sub{color:var(--muted);margin-top:6px}.panel{background:rgba(24,24,27,.92);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 20px 60px rgba(0,0,0,.35)}.row,.specs,.advanced{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.wide{grid-column:span 2}.field label{font-size:.76rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}.field input,.field select,.field textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font:inherit}.field textarea{min-height:64px;resize:vertical}.modes{display:flex;gap:8px;flex-wrap:wrap}.modes button,.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer}.modes button{background:var(--panel2);color:var(--text);border:1px solid var(--border)}.modes button.active{background:var(--accent);border-color:var(--accent)}.btn{background:var(--accent);color:#fff}.btn.secondary{background:#3f3f46}.btn.danger{background:var(--bad)}.btn:disabled{opacity:.45;cursor:not-allowed}.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.chip{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px}.chip b{display:block;font-size:.72rem;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.drop{display:grid;place-items:center;text-align:center;min-height:180px;border:2px dashed #52525b;border-radius:16px;padding:24px;cursor:pointer;background:rgba(255,255,255,.02)}.drop.drag,.drop:hover{border-color:var(--accent);background:rgba(59,130,246,.08)}.drop input{display:none}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.status{min-height:24px;color:var(--muted);margin-top:12px}.results{display:grid;gap:12px;margin-top:16px}.item{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;padding:12px;border-radius:14px;border:1px solid var(--border);background:rgba(39,39,42,.75)}.item.pass{border-color:rgba(34,197,94,.55)}.item.fail{border-color:rgba(239,68,68,.65)}.thumb{width:72px;height:60px;object-fit:contain;border-radius:8px;background:repeating-conic-gradient(#222 0 25%,#333 0 50%) 50%/12px 12px}.name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.details,.validation,.note{font-size:.82rem;color:var(--muted);margin-top:5px}.validation.pass{color:#86efac}.validation.fail{color:#fca5a5}.download{display:inline-block;text-decoration:none;background:var(--good);color:#fff;font-weight:700;border-radius:9px;padding:9px 12px;white-space:nowrap}.note{font-size:.78rem}.hidden{display:none!important}details{margin-top:12px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.02)}summary{padding:14px 16px;cursor:pointer;font-weight:700}.detail-body{padding:0 16px 16px}@media(max-width:840px){body{padding:14px}.row,.specs,.advanced,.chips{grid-template-columns:1fr 1fr}.field.wide{grid-column:span 2}.top{align-items:flex-start;flex-direction:column}.item{grid-template-columns:60px 1fr}.thumb{width:60px;height:60px}.download{grid-column:1/-1;text-align:center}}@media(max-width:480px){.row,.specs,.advanced,.chips{grid-template-columns:1fr}.field.wide{grid-column:span 1}}
</style>
</head>
<body>
<main class="app">
<div class="top"><div><h1>Image Asset Converter</h1><div class="sub">Use a media preset or do a quick file-type conversion.</div></div><a class="back" href="/">← Internal Apps</a></div>
<section class="panel"><div class="modes"><button id="presetModeBtn" class="active" type="button">Preset asset</button><button id="simpleModeBtn" type="button">Simple convert</button></div><div id="modeText" class="note" style="margin-top:10px">Preset mode checks format, dimensions, and maximum file size.</div></section>
<section id="presetPanel" class="panel">
<div class="row"><div class="field wide"><label for="preset">Preset</label><select id="preset"></select></div><div class="field"><label for="assetName">Asset name</label><input id="assetName"></div><div class="field"><label for="format">Format</label><select id="format"><option value="image/png">PNG</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select></div></div>
<div class="specs" style="margin-top:12px"><div class="field"><label for="sizeType">Dimension rule</label><select id="sizeType"><option value="exact">Exact</option><option value="range">Range</option><option value="none">None</option></select></div><div class="field exact-only"><label for="width">Width (px)</label><input id="width" type="number" min="1"></div><div class="field exact-only"><label for="height">Height (px)</label><input id="height" type="number" min="1"></div><div class="field"><label for="maxSize">Max file size (MB)</label><input id="maxSize" type="number" min="0.01" step="0.01"></div><div class="field range-only hidden"><label for="heightMin">Min height (px)</label><input id="heightMin" type="number" min="1"></div><div class="field range-only hidden"><label for="heightMax">Max height (px)</label><input id="heightMax" type="number" min="1"></div><div class="field range-only hidden"><label for="widthRatio">Max width ÷ height</label><input id="widthRatio" type="number" min="0.1" step="0.1"></div><div class="field"><label for="backgroundRule">Background</label><select id="backgroundRule"><option value="any">Any</option><option value="transparent">Transparent</option></select></div></div>
<div class="chips" id="summary"></div><details><summary>Optional notes</summary><div class="detail-body"><div class="field"><label for="notes">Notes</label><textarea id="notes"></textarea></div></div></details>
</section>
<section class="panel"><label class="drop" id="dropZone"><input id="fileInput" type="file" accept="image/*" multiple><div><div style="font-size:3rem">🖼️</div><strong>Drop images here or click to browse</strong><div class="note">Supports PNG, JPG, WebP, GIF, and BMP that your browser can decode.</div></div></label><details><summary>Advanced options</summary><div class="detail-body"><div class="advanced"><div class="field"><label for="fit">Fit</label><select id="fit"><option value="contain">Contain</option><option value="cover">Cover</option><option value="stretch">Stretch</option></select></div><div class="field"><label for="quality">Quality</label><input id="quality" type="range" min="10" max="100" value="92"></div><div class="field"><label for="qualityOut">Quality value</label><input id="qualityOut" value="92" readonly></div><div class="field"><label for="bgColor">Background color</label><input id="bgColor" type="color" value="#ffffff"></div></div></div></details><div class="actions"><button id="convertBtn" class="btn" disabled>Convert</button><button id="downloadBtn" class="btn secondary" disabled>Download All Passing</button><button id="clearBtn" class="btn danger" disabled>Clear</button></div><div id="status" class="status"></div><div class="note">Display image preset validates height 400–760 px and width ≤ 1.5 × height. JPEG cannot keep transparency.</div><div id="results" class="results"></div></section>
</main>
<script>
const PRESETS=[{key:'box',name:'Box image',format:'image/png',sizeType:'exact',width:280,height:280,maxSize:5,background:'transparent',notes:'PNG, 280 × 280 px.'},{key:'icon',name:'Icon image',format:'image/png',sizeType:'exact',width:50,height:50,maxSize:5,background:'any',notes:'PNG, 50 × 50 px.'},{key:'banner',name:'Banner image',format:'image/jpeg',sizeType:'exact',width:1386,height:400,maxSize:5,background:'any',notes:'JPG, 1386 × 400 px.'},{key:'publisher',name:'Publisher image',format:'image/png',sizeType:'exact',width:280,height:280,maxSize:5,background:'any',notes:'PNG, 280 × 280 px.'},{key:'display',name:'Display image',format:'image/jpeg',sizeType:'range',heightMin:400,heightMax:760,widthRatio:1.5,maxSize:5,background:'any',notes:'JPG, H 400–760 px; W ≤ 1.5 × H.'},{key:'title',name:'Title image',format:'image/png',sizeType:'exact',width:2000,height:2000,maxSize:5,background:'any',notes:'PNG, 2000 × 2000 px.'}];
const $=id=>document.getElementById(id),els={preset:$('preset'),assetName:$('assetName'),format:$('format'),sizeType:$('sizeType'),width:$('width'),height:$('height'),maxSize:$('maxSize'),heightMin:$('heightMin'),heightMax:$('heightMax'),widthRatio:$('widthRatio'),backgroundRule:$('backgroundRule'),notes:$('notes'),summary:$('summary'),fileInput:$('fileInput'),dropZone:$('dropZone'),fit:$('fit'),quality:$('quality'),qualityOut:$('qualityOut'),bgColor:$('bgColor'),convertBtn:$('convertBtn'),downloadBtn:$('downloadBtn'),clearBtn:$('clearBtn'),results:$('results'),status:$('status'),presetPanel:$('presetPanel'),presetModeBtn:$('presetModeBtn'),simpleModeBtn:$('simpleModeBtn'),modeText:$('modeText')};let files=[],outputs=[],simpleMode=false;
const formatLabel=t=>t==='image/jpeg'?'JPG':t==='image/png'?'PNG':t==='image/webp'?'WebP':t,fmtBytes=b=>b<1024?`${b} B`:b<1048576?`${(b/1024).toFixed(1)} KB`:`${(b/1048576).toFixed(2)} MB`,mb=b=>b/1048576,ext=t=>t==='image/jpeg'?'jpg':t.split('/')[1],slug=s=>(s||'asset').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'asset',base=n=>n.replace(/\.[^.]+$/,'')||'converted-image';
function setMode(simple){simpleMode=simple;els.presetModeBtn.classList.toggle('active',!simple);els.simpleModeBtn.classList.toggle('active',simple);els.presetPanel.classList.toggle('hidden',simple);els.modeText.textContent=simple?'Simple convert ignores preset validation and just converts the files.':'Preset mode checks format, dimensions, and maximum file size.'}function buildPresets(){els.preset.innerHTML=PRESETS.map(p=>`<option value="${p.key}">${p.name}</option>`).join('')}function applyPreset(key){const p=PRESETS.find(x=>x.key===key)||PRESETS[0];els.assetName.value=p.name;els.format.value=p.format;els.sizeType.value=p.sizeType;els.width.value=p.width||'';els.height.value=p.height||'';els.maxSize.value=p.maxSize;els.heightMin.value=p.heightMin||'';els.heightMax.value=p.heightMax||'';els.widthRatio.value=p.widthRatio||'';els.backgroundRule.value=p.background;els.notes.value=p.notes||'';toggleRuleFields();refreshSummary()}function toggleRuleFields(){const exact=els.sizeType.value==='exact',range=els.sizeType.value==='range';document.querySelectorAll('.exact-only').forEach(x=>x.classList.toggle('hidden',!exact));document.querySelectorAll('.range-only').forEach(x=>x.classList.toggle('hidden',!range))}function refreshSummary(){let dims='No dimension rule';if(els.sizeType.value==='exact')dims=`${els.width.value||'?'} × ${els.height.value||'?'} px`;if(els.sizeType.value==='range')dims=`H ${els.heightMin.value||'?'}–${els.heightMax.value||'?'} px; W ≤ ${els.widthRatio.value||'?'} × H`;els.summary.innerHTML=`<div class="chip"><b>Asset</b>${els.assetName.value||'Asset'}</div><div class="chip"><b>Format</b>${formatLabel(els.format.value)}</div><div class="chip"><b>Dimensions</b>${dims}</div><div class="chip"><b>Max size</b>${els.maxSize.value||'—'} MB</div>`}function clean(){outputs.forEach(x=>URL.revokeObjectURL(x.url));outputs=[]}function setFiles(list){files=list.filter(f=>f.type.startsWith('image/')||/\.(png|jpe?g|gif|bmp|webp)$/i.test(f.name));clean();els.results.innerHTML='';els.convertBtn.disabled=!files.length;els.clearBtn.disabled=!files.length;els.downloadBtn.disabled=true;els.status.textContent=files.length?`${files.length} image${files.length===1?'':'s'} ready.`:'No supported image files selected.'}function clearAll(){files=[];els.fileInput.value='';clean();els.results.innerHTML='';els.status.textContent='';els.convertBtn.disabled=els.downloadBtn.disabled=els.clearBtn.disabled=true}function targetSize(sw,sh){if(simpleMode||els.sizeType.value==='none')return{w:sw,h:sh};if(els.sizeType.value==='exact')return{w:Math.max(1,+els.width.value||sw),h:Math.max(1,+els.height.value||sh)};let h=Math.min(Math.max(sh,+els.heightMin.value||sh),+els.heightMax.value||sh),w=Math.round(sw*(h/sh)),r=+els.widthRatio.value||Infinity;if(w>h*r)w=Math.floor(h*r);return{w:Math.max(1,w),h:Math.max(1,h)}}function draw(img,ctx,w,h){if(els.fit.value==='stretch'){ctx.drawImage(img,0,0,w,h);return}const sr=img.naturalWidth/img.naturalHeight,tr=w/h;let dw,dh;if((els.fit.value==='contain'&&sr>tr)||(els.fit.value==='cover'&&sr<tr)){dw=w;dh=dw/sr}else{dh=h;dw=dh*sr}const dx=(w-dw)/2,dy=(h-dh)/2;if(els.fit.value==='cover'){ctx.save();ctx.beginPath();ctx.rect(0,0,w,h);ctx.clip();ctx.drawImage(img,dx,dy,dw,dh);ctx.restore()}else ctx.drawImage(img,dx,dy,dw,dh)}function toBlob(canvas,type,q){return new Promise((res,rej)=>canvas.toBlob(b=>b?res(b):rej(new Error('Conversion failed.')),type,q))}function load(file){return new Promise((res,rej)=>{const u=URL.createObjectURL(file),i=new Image();i.onload=()=>{URL.revokeObjectURL(u);res(i)};i.onerror=()=>{URL.revokeObjectURL(u);rej(new Error('This browser could not decode the file.'))};i.src=u})}async function exportCanvas(canvas){let q=+els.quality.value/100,blob=await toBlob(canvas,els.format.value,q),limit=+els.maxSize.value||Infinity;if(simpleMode||els.format.value==='image/png'||mb(blob.size)<=limit)return blob;while(q>0.1&&mb(blob.size)>limit){q=Math.max(0.1,+(q-.05).toFixed(2));blob=await toBlob(canvas,els.format.value,q)}return blob}function validate(item){if(simpleMode)return{pass:true,msg:'Simple conversion complete.'};let msgs=[],pass=true;if(item.type!==els.format.value){pass=false;msgs.push(`Expected ${formatLabel(els.format.value)}.`)}else msgs.push(`Format OK (${formatLabel(item.type)}).`);if(els.sizeType.value==='exact'){const ok=item.w===+els.width.value&&item.h===+els.height.value;ok?msgs.push(`Dimensions OK (${item.w} × ${item.h}).`):(pass=false,msgs.push(`Needs ${els.width.value} × ${els.height.value}px.`))}if(els.sizeType.value==='range'){const min=+els.heightMin.value||0,max=+els.heightMax.value||Infinity,ratio=+els.widthRatio.value||Infinity,ok=item.h>=min&&item.h<=max&&item.w<=item.h*ratio+.01;ok?msgs.push(`Dimension rule OK (${item.w} × ${item.h}).`):(pass=false,msgs.push(`Needs H ${min}-${max}px and W ≤ ${ratio}×H.`))}if(mb(item.blob.size)>+els.maxSize.value){pass=false;msgs.push(`Too large: ${fmtBytes(item.blob.size)}.`)}else msgs.push(`File size OK (${fmtBytes(item.blob.size)}).`);if(els.backgroundRule.value==='transparent'&&els.format.value!=='image/png'){pass=false;msgs.push('Transparent background requires PNG.')}return{pass,msg:msgs.join(' ')}}function render(item){const a=document.createElement('article');a.className=`item ${item.validation.pass?'pass':'fail'}`;a.innerHTML=`<img class="thumb" alt="Preview"><div><div class="name"></div><div class="details"></div><div class="validation"></div></div><a class="download" download>Download</a>`;a.querySelector('.thumb').src=item.url;a.querySelector('.name').textContent=item.name;a.querySelector('.details').textContent=`${item.w} × ${item.h} • ${fmtBytes(item.blob.size)} (was ${fmtBytes(item.original)})`;const v=a.querySelector('.validation');v.textContent=item.validation.msg;v.className=`validation ${item.validation.pass?'pass':'fail'}`;const link=a.querySelector('.download');link.href=item.url;link.download=item.name;els.results.appendChild(a)}function renderError(file,error){const a=document.createElement('article');a.className='item fail';a.innerHTML='<div style="font-size:2rem">⚠️</div><div><div class="name"></div><div class="validation fail"></div></div>';a.querySelector('.name').textContent=file.name;a.querySelector('.validation').textContent=error.message;els.results.appendChild(a)}async function convertOne(file,i){const img=await load(file),t=targetSize(img.naturalWidth,img.naturalHeight),c=document.createElement('canvas');c.width=t.w;c.height=t.h;const alpha=els.format.value==='image/png'&&!simpleMode&&els.backgroundRule.value==='transparent',x=c.getContext('2d',{alpha});if(!alpha){x.fillStyle=els.bgColor.value;x.fillRect(0,0,c.width,c.height)}draw(img,x,t.w,t.h);const blob=await exportCanvas(c),name=(simpleMode?base(file.name):slug(els.assetName.value||base(file.name)))+(files.length>1?`-${i+1}`:'')+'.'+ext(els.format.value),item={blob,url:URL.createObjectURL(blob),name,w:c.width,h:c.height,original:file.size,type:els.format.value};item.validation=validate(item);return item}async function convertAll(){els.convertBtn.disabled=true;els.downloadBtn.disabled=true;clean();els.results.innerHTML='';let ok=0,pass=0;for(let i=0;i<files.length;i++){els.status.textContent=`Converting ${i+1} of ${files.length}: ${files[i].name}`;try{const item=await convertOne(files[i],i);outputs.push(item);render(item);ok++;if(item.validation.pass)pass++}catch(err){renderError(files[i],err)}}els.status.textContent=simpleMode?`Finished: ${ok} of ${files.length} converted.`:`Finished: ${ok} of ${files.length} converted. ${pass} passing.`;els.convertBtn.disabled=false;els.downloadBtn.disabled=!outputs.some(x=>x.validation.pass)}async function downloadAll(){for(const item of outputs.filter(x=>x.validation.pass)){const a=document.createElement('a');a.href=item.url;a.download=item.name;document.body.appendChild(a);a.click();a.remove();await new Promise(r=>setTimeout(r,200))}}
buildPresets();applyPreset('box');setMode(false);els.quality.addEventListener('input',()=>els.qualityOut.value=els.quality.value);els.preset.addEventListener('change',()=>applyPreset(els.preset.value));[els.assetName,els.format,els.sizeType,els.width,els.height,els.maxSize,els.heightMin,els.heightMax,els.widthRatio,els.backgroundRule].forEach(el=>el.addEventListener('input',()=>{toggleRuleFields();refreshSummary()}));els.presetModeBtn.addEventListener('click',()=>setMode(false));els.simpleModeBtn.addEventListener('click',()=>setMode(true));els.fileInput.addEventListener('change',()=>setFiles([...els.fileInput.files]));['dragenter','dragover'].forEach(t=>els.dropZone.addEventListener(t,e=>{e.preventDefault();els.dropZone.classList.add('drag')}));['dragleave','drop'].forEach(t=>els.dropZone.addEventListener(t,e=>{e.preventDefault();els.dropZone.classList.remove('drag')}));els.dropZone.addEventListener('drop',e=>setFiles([...e.dataTransfer.files]));els.convertBtn.addEventListener('click',convertAll);els.downloadBtn.addEventListener('click',downloadAll);els.clearBtn.addEventListener('click',clearAll);toggleRuleFields();refreshSummary();els.quality.dispatchEvent(new Event('input'));
</script>
</body>
</html>
