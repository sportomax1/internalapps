<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenSCAD 3D Preview Lab v6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header>
    <div class="brand">OpenSCAD <span>Preview Lab v6</span></div>
    <div class="mobile-tabs">
      <button id="tabCode">Code</button><button id="tabPreview">Preview</button>
    </div>
    <div class="toolbar">
      <select id="exampleSelect" class="select optional" aria-label="Load example">
        <option value="">Examples…</option>
        <option value="box">Hollow box</option>
        <option value="dice">Rounded dice</option>
        <option value="stack">CSG stack</option>
        <option value="poly">Polyhedron</option>
      </select>
      <button id="openBtn" class="optional">Open .scad</button>
      <button id="saveBtn" class="optional">Save .scad</button>
      <button id="renderBtn" class="primary">▶ Render</button>
    </div>
  </header>

  <main class="workspace" id="workspace">
    <section class="editor-pane">
      <div class="pane-head">
        <div class="pane-title">OpenSCAD code</div>
        <div class="hint">Ctrl/⌘ + Enter to render</div>
      </div>
      <textarea id="code" spellcheck="false" aria-label="OpenSCAD code editor"></textarea>
      <div class="console" id="console">Ready. This browser preview supports a practical OpenSCAD subset.</div>
    </section>

    <div class="splitter" id="splitter" title="Drag to resize"></div>

    <section class="preview-pane">
      <div id="viewport"></div>
      <div class="viewbar">
        <button data-view="iso">Iso</button>
        <button data-view="front">Front</button>
        <button data-view="top">Top</button>
        <button data-view="right">Right</button>
        <button id="fitBtn">Fit</button>
        <button id="gridBtn">Grid</button>
        <button id="wireBtn">Wireframe</button>
      </div>
      <div class="stats" id="stats">No model</div>
      <div class="empty" id="empty"><div><strong>3D preview</strong>Press Render to compile the code.</div></div>
    </section>
  </main>

  <footer>
    <span class="dot"></span><span id="status">Ready</span>
    <span class="spacer"></span>
    <span>Offline editor • CDN-powered 3D engine</span>
  </footer>
</div>
<input type="file" id="fileInput" accept=".scad,text/plain" hidden />
<script type="module">
  const parts = ["app-1.js","app-2.js","app-3.js","app-4.js","app-5.js"];
  const source = (await Promise.all(parts.map(p => fetch(p).then(r => { if (!r.ok) throw new Error(`Failed to load ${p}`); return r.text(); })))).join("");
  const url = URL.createObjectURL(new Blob([source], { type: "text/javascript" }));
  try { await import(url); } finally { URL.revokeObjectURL(url); }
</script>
</body>
</html>
