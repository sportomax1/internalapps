<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>HTML App Runner</title>
  <style>
    :root{color-scheme:dark;--bg:#080b14;--panel:rgba(18,24,43,.94);--panel2:#11182b;--border:rgba(255,255,255,.12);--text:#f8fafc;--muted:#9aa6bd;--accent:#3b82f6;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}button,.button{font:inherit;-webkit-tap-highlight-color:transparent}.app{height:100dvh;display:grid;grid-template-rows:auto 1fr;background:radial-gradient(circle at 10% 0%,rgba(59,130,246,.18),transparent 35%),var(--bg)}
    .toolbar{display:grid;grid-template-columns:auto auto minmax(0,1fr) auto auto;align-items:center;gap:8px;padding:calc(8px + var(--safe-top)) 10px 8px;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:5}.button,.icon-button{min-height:42px;border:1px solid var(--border);border-radius:12px;color:#fff;background:var(--panel2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.button{padding:0 13px;font-weight:700;white-space:nowrap}.button.primary{background:var(--accent);border-color:transparent}.icon-button{width:42px;padding:0;font-size:19px}.icon-button:disabled{opacity:.42}#fileInput{display:none}.file-info{min-width:0}.filename,.status{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.filename{font-weight:650;font-size:14px}.status{margin-top:2px;color:var(--muted);font-size:11px}
    .stage{min-height:0;position:relative;overflow:hidden;background:#fff}#viewer{display:block;width:100%;height:100%;border:0;background:#fff}.empty{position:absolute;inset:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 25%,rgba(59,130,246,.13),transparent 35%),var(--bg);text-align:center}.empty[hidden]{display:none}.empty-card{width:min(470px,100%);padding:28px 22px;border:1px solid var(--border);border-radius:22px;background:rgba(17,24,43,.84);box-shadow:0 24px 80px rgba(0,0,0,.35)}.empty-icon{font-size:52px}.empty h1{margin:14px 0 8px;font-size:24px}.empty p{margin:0;color:var(--muted);line-height:1.5;font-size:14px}.empty-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}.empty-actions .button{width:100%}
    .paste-panel{position:fixed;inset:0;z-index:30;display:grid;grid-template-rows:auto 1fr auto;background:var(--bg);padding:calc(10px + var(--safe-top)) 10px calc(10px + var(--safe-bottom));gap:10px}.paste-panel[hidden]{display:none}.paste-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.paste-head h2{margin:0;font-size:20px}.paste-panel textarea{width:100%;height:100%;resize:none;border:1px solid var(--border);border-radius:14px;background:#050812;color:#fff;padding:14px;font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;outline:none}.paste-panel textarea:focus{border-color:var(--accent)}.paste-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .notice{position:fixed;left:12px;right:12px;bottom:calc(12px + var(--safe-bottom));z-index:40;padding:12px 14px;border-radius:13px;background:rgba(15,23,42,.97);border:1px solid var(--border);box-shadow:0 12px 32px rgba(0,0,0,.35);font-size:13px;transform:translateY(140%);opacity:0;transition:.22s ease;pointer-events:none}.notice.show{transform:translateY(0);opacity:1}body.focus-mode .toolbar{display:none}body.focus-mode .app{grid-template-rows:1fr}
    @media(max-width:620px){.toolbar{grid-template-columns:auto auto minmax(0,1fr) auto}.toolbar .clear{display:none}.button{padding:0 11px}.filename{font-size:13px}.empty-actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar" aria-label="HTML runner controls">
      <label class="button primary" for="fileInput">Upload</label>
      <input id="fileInput" type="file" accept=".html,.htm,text/html">
      <button id="pasteButton" class="button" type="button">Paste</button>
      <div class="file-info"><div id="filename" class="filename">No app loaded</div><div id="status" class="status">Upload a file or paste HTML</div></div>
      <button id="focusButton" class="icon-button" type="button" aria-label="Enter focus mode" title="Focus mode" disabled>⛶</button>
      <button id="clearButton" class="icon-button clear" type="button" aria-label="Close current app" title="Close" disabled>✕</button>
    </header>
    <section class="stage">
      <iframe id="viewer" title="Loaded HTML app" sandbox="allow-scripts allow-forms allow-modals allow-downloads allow-popups allow-popups-to-escape-sandbox allow-pointer-lock allow-presentation allow-same-origin" allow="camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen" hidden></iframe>
      <div id="emptyState" class="empty"><div class="empty-card"><div class="empty-icon" aria-hidden="true">📱</div><h1>HTML App Runner</h1><p>Run a self-contained SPA by selecting an HTML file from Files or pasting the complete HTML source.</p><div class="empty-actions"><label class="button primary" for="fileInput">Upload HTML File</label><button id="emptyPasteButton" class="button" type="button">Paste HTML</button></div></div></div>
    </section>
  </main>

  <section id="pastePanel" class="paste-panel" hidden aria-label="Paste HTML source">
    <div class="paste-head"><h2>Paste HTML</h2><button id="cancelPasteButton" class="icon-button" type="button" aria-label="Cancel">✕</button></div>
    <textarea id="htmlInput" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="Paste the complete HTML document here..."></textarea>
    <div class="paste-actions"><button id="clearPasteButton" class="button" type="button">Clear Text</button><button id="runPasteButton" class="button primary" type="button">Run HTML</button></div>
  </section>

  <div id="notice" class="notice" role="status" aria-live="polite"></div>

  <script>
    (()=>{"use strict";
      const $=id=>document.getElementById(id),fileInput=$("fileInput"),viewer=$("viewer"),filename=$("filename"),status=$("status"),emptyState=$("emptyState"),focusButton=$("focusButton"),clearButton=$("clearButton"),pasteButton=$("pasteButton"),emptyPasteButton=$("emptyPasteButton"),pastePanel=$("pastePanel"),htmlInput=$("htmlInput"),runPasteButton=$("runPasteButton"),cancelPasteButton=$("cancelPasteButton"),clearPasteButton=$("clearPasteButton"),notice=$("notice");let noticeTimer=0;
      function showNotice(message){clearTimeout(noticeTimer);notice.textContent=message;notice.classList.add("show");noticeTimer=setTimeout(()=>notice.classList.remove("show"),2800)}
      function formatBytes(bytes){if(bytes<1024)return`${bytes} B`;if(bytes<1048576)return`${(bytes/1024).toFixed(1)} KB`;return`${(bytes/1048576).toFixed(1)} MB`}
      function looksLikeHtml(html){return /<html[\s>]|<!doctype\s+html|<body[\s>]|<script[\s>]|<style[\s>]/i.test(html)}
      function runHtml(html,name,source){if(!html.trim()){showNotice("Paste or select some HTML first.");return}if(!looksLikeHtml(html))showNotice("This may not be a complete HTML app.");viewer.srcdoc=html;viewer.hidden=false;emptyState.hidden=true;filename.textContent=name;status.textContent=source;focusButton.disabled=false;clearButton.disabled=false;document.title=`${name} • HTML Runner`;pastePanel.hidden=true}
      async function loadFile(file){const name=file.name.toLowerCase();if(!(file.type==="text/html"||name.endsWith(".html")||name.endsWith(".htm"))){showNotice("Please select an .html or .htm file.");fileInput.value="";return}try{runHtml(await file.text(),file.name,`${formatBytes(file.size)} • Loaded from Files`)}catch(error){console.error(error);showNotice("The selected HTML file could not be read.")}}
      function openPaste(){pastePanel.hidden=false;setTimeout(()=>htmlInput.focus(),0)}
      function clearApp(){document.body.classList.remove("focus-mode");viewer.srcdoc="";viewer.hidden=true;emptyState.hidden=false;filename.textContent="No app loaded";status.textContent="Upload a file or paste HTML";fileInput.value="";focusButton.disabled=true;clearButton.disabled=true;document.title="HTML App Runner"}
      fileInput.addEventListener("change",()=>{const file=fileInput.files&&fileInput.files[0];if(file)loadFile(file)});pasteButton.addEventListener("click",openPaste);emptyPasteButton.addEventListener("click",openPaste);cancelPasteButton.addEventListener("click",()=>pastePanel.hidden=true);clearPasteButton.addEventListener("click",()=>{htmlInput.value="";htmlInput.focus()});runPasteButton.addEventListener("click",()=>runHtml(htmlInput.value,"Pasted HTML",`${formatBytes(new Blob([htmlInput.value]).size)} • Pasted source`));focusButton.addEventListener("click",()=>document.body.classList.toggle("focus-mode"));clearButton.addEventListener("click",clearApp);window.addEventListener("keydown",event=>{if(event.key==="Escape"){if(!pastePanel.hidden)pastePanel.hidden=true;else if(document.body.classList.contains("focus-mode"))document.body.classList.remove("focus-mode")}});
    })();
  </script>
</body>
</html>
