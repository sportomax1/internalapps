<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08101f">
<title>Quick Paste Runner</title>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
:root{color-scheme:dark;--bg:#07101f;--panel:#101a2e;--panel2:#0a1222;--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--top:env(safe-area-inset-top,0px);--bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,label,textarea{font:inherit}.app{height:100dvh;display:grid;grid-template-rows:auto auto 1fr}.topbar{display:flex;align-items:center;gap:6px;padding:calc(7px + var(--top)) 8px 7px;background:rgba(16,26,46,.98);border-bottom:1px solid var(--line);overflow-x:auto}.brand{font-weight:800;white-space:nowrap}.grow{flex:1;min-width:80px}.meta{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.btn{min-height:42px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);color:#fff;padding:0 11px;font-weight:750;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}.btn.primary{background:var(--blue);border-color:transparent}.btn.good{border-color:rgba(34,197,94,.55);color:#bbf7d0}.btn.bad{border-color:rgba(248,113,113,.55);color:#fecaca}.btn.danger{color:#fecaca}.icon{width:42px;padding:0}.status{font-size:10px;color:var(--muted);min-width:68px;text-align:center;white-space:nowrap}.status.good{color:#86efac}.status.bad{color:#fca5a5}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:7px 10px;background:var(--panel);border-bottom:1px solid var(--line)}.tab{min-height:38px;border:0;border-radius:9px;background:transparent;color:var(--muted);font-weight:750}.tab.active{background:var(--panel2);color:#fff}.workspace{min-height:0;position:relative}.view{position:absolute;inset:0;display:none}.view.active{display:block}.editor-wrap{height:100%;display:grid;grid-template-rows:1fr auto;background:var(--panel2)}textarea{width:100%;height:100%;resize:none;border:0;outline:0;padding:14px;background:#050a14;color:#e2e8f0;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;tab-size:2}.editor-actions{display:flex;gap:8px;flex-wrap:wrap;padding:9px 10px calc(9px + var(--bottom));border-top:1px solid var(--line);background:var(--panel)}#preview{width:100%;height:100%;border:0;background:#fff;display:block}.empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:28px;background:radial-gradient(circle at 50% 18%,rgba(59,130,246,.18),transparent 38%),var(--bg)}.empty[hidden]{display:none}.empty-card{width:min(520px,100%);padding:26px;border:1px solid var(--line);border-radius:22px;background:rgba(16,26,46,.92)}.empty h1{margin:0 0 8px}.empty p{margin:0;color:var(--muted);line-height:1.45}.empty-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.empty .btn{width:100%}#fileInput{display:none}.explain{height:100%;display:grid;grid-template-columns:minmax(220px,36%) 1fr;background:var(--bg)}.outline{overflow:auto;border-right:1px solid var(--line);padding:10px}.block{width:100%;text-align:left;border:1px solid var(--line);border-radius:11px;background:var(--panel2);color:#fff;padding:10px;margin-bottom:8px}.block small{display:block;color:var(--muted);margin-top:4px}.block.active{border-color:var(--blue)}.detail{overflow:auto;padding:18px}.detail h2{margin-top:0}.detail p,.detail li{color:#cbd5e1;line-height:1.55}.detail pre{white-space:pre-wrap;overflow-wrap:anywhere;background:#050a14;border:1px solid var(--line);border-radius:12px;padding:12px;color:#dbeafe}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;background:rgba(59,130,246,.15);color:#bfdbfe;font-size:12px;font-weight:750}.diag{position:fixed;z-index:50;inset:auto 10px calc(10px + var(--bottom));max-height:55vh;overflow:auto;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(5,10,20,.98);box-shadow:0 15px 45px rgba(0,0,0,.45)}.diag[hidden]{display:none}.diag-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.diag h3{margin:0}.diag pre{white-space:pre-wrap;margin:10px 0 0;color:#cbd5e1;font:12px/1.45 ui-monospace,monospace}.toast{position:fixed;left:12px;right:12px;bottom:calc(12px + var(--bottom));z-index:60;padding:12px 14px;border-radius:13px;background:rgba(15,23,42,.98);border:1px solid var(--line);transform:translateY(150%);opacity:0;transition:.2s}.toast.error{background:rgba(69,10,10,.98);border-color:rgba(248,113,113,.5)}.toast.show{transform:none;opacity:1}body.focus .topbar,body.focus .tabs{display:none}body.focus .app{grid-template-rows:1fr}.hint{font-size:12px;color:var(--muted);align-self:center}
@media(max-width:820px){.brand,.grow{display:none}.btn{padding:0 9px}.topbar{gap:5px}.status{min-width:52px}.explain{grid-template-columns:1fr}.outline{max-height:42%;border-right:0;border-bottom:1px solid var(--line)}.detail{min-height:58%}.hint{display:none}.empty-actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="app">
<header class="topbar">
<div class="brand">Quick Paste Runner</div>
<button id="pasteBtn" class="btn primary" type="button">Paste & Run</button>
<label class="btn" for="fileInput">Upload</label><input id="fileInput" type="file" accept=".html,.htm,.jsx,.tsx,text/html,text/javascript">
<div class="grow"><div id="sourceName">Ready</div><div id="meta" class="meta">One tap reads your clipboard and runs it.</div></div>
<button id="muteBtn" class="btn good" type="button">🔊 On</button>
<button id="webAudioBtn" class="btn" type="button">Web Tone</button>
<button id="mediaAudioBtn" class="btn" type="button">WAV Tone</button>
<button id="diagBtn" class="btn" type="button">Audio Info</button>
<div id="audioStatus" class="status">Idle</div>
<button id="focusBtn" class="btn icon" type="button">⛶</button>
<button id="clearBtn" class="btn icon danger" type="button">✕</button>
</header>
<nav class="tabs"><button class="tab active" data-view="code">Code</button><button class="tab" data-view="preview">Preview</button><button class="tab" data-view="learn">Explain</button></nav>
<section class="workspace">
<div id="codeView" class="view active"><div class="editor-wrap"><textarea id="code" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="Tap Paste & Run, or paste HTML / JSX / TSX here. Pasting into this box auto-runs."></textarea><div class="editor-actions"><button id="runBtn" class="btn primary" type="button">Run Updated Code</button><button id="copyBtn" class="btn" type="button">Copy</button><button id="eraseBtn" class="btn" type="button">Erase</button><span class="hint">Web Tone primes iOS media, then tests a generated Web Audio buffer.</span></div></div></div>
<div id="previewView" class="view"><iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-downloads allow-popups allow-popups-to-escape-sandbox allow-pointer-lock allow-presentation allow-same-origin" allow="autoplay; camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen"></iframe><div id="empty" class="empty"><div class="empty-card"><h1>Paste and Run</h1><p>Paste HTML, JSX, or TSX. Audio tests are available in the top bar.</p><div class="empty-actions"><button id="startPaste" class="btn primary" type="button">Paste & Run</button><label class="btn" for="fileInput">Upload File</label></div></div></div></div>
<div id="learnView" class="view"><div class="explain"><div id="outline" class="outline"></div><article id="detail" class="detail"><h2>Education Mode</h2><p>Run code, then select a detected block.</p></article></div></div></div>
</section>
</main>
<section id="diag" class="diag" hidden><div class="diag-head"><h3>Audio diagnostics</h3><button id="closeDiag" class="btn icon" type="button">✕</button></div><pre id="diagText"></pre></section>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),code=$('code'),preview=$('preview'),empty=$('empty'),sourceName=$('sourceName'),meta=$('meta'),fileInput=$('fileInput'),toast=$('toast'),muteBtn=$('muteBtn'),audioStatus=$('audioStatus'),diag=$('diag'),diagText=$('diagText'),tabs=[...document.querySelectorAll('.tab')];
let toastTimer=0,muted=false,outerContext=null,mediaTest=null,lastWebResult='Not run',lastWavResult='Not run',lastFrameResult='No preview response',lastError='None';
function showToast(message,isError=false){clearTimeout(toastTimer);toast.textContent=message;toast.classList.toggle('error',isError);toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),4200)}
function setView(name){tabs.forEach(t=>t.classList.toggle('active',t.dataset.view===name));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(name+'View').classList.add('active')}
function formatBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB'}
function setStatus(text,state=''){audioStatus.textContent=text;audioStatus.className='status'+(state?' '+state:'')}
function audioCtor(){return window.AudioContext||window.webkitAudioContext}
function sendAudio(command){try{preview.contentWindow?.postMessage({type:'runner-audio',command,muted},'*')}catch(error){lastError=String(error)}}
function updateDiagnostics(){const ua=navigator.userAgent;diagText.textContent=[
'User agent: '+ua,
'UA note: iPhone Safari may identify itself as Macintosh; that is normal.',
'Secure context: '+window.isSecureContext,
'Page visibility: '+document.visibilityState,
'Web Audio available: '+Boolean(audioCtor()),
'Outer AudioContext state: '+(outerContext?.state||'not created'),
'Outer sample rate: '+(outerContext?.sampleRate||'n/a'),
'Runner muted: '+muted,
'Last Web Tone: '+lastWebResult,
'Last WAV Tone: '+lastWavResult,
'Last preview result: '+lastFrameResult,
'Last error: '+lastError,
'',
'Interpretation:',
'- WAV works but Web fails: Safari Web Audio session issue, not speaker volume.',
'- Web Tone now primes the same working media session before creating its buffer.',
'- A running AudioContext alone does not prove audible output.'
].join('\n')}
function makeWavUrl(duration=.25,volume=.25){const rate=22050,count=Math.floor(rate*duration),bytes=44+count*2,buffer=new ArrayBuffer(bytes),view=new DataView(buffer),text=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i))};text(0,'RIFF');view.setUint32(4,bytes-8,true);text(8,'WAVE');text(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);view.setUint32(24,rate,true);view.setUint32(28,rate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);text(36,'data');view.setUint32(40,count*2,true);for(let i=0;i<count;i++){const t=i/rate,env=Math.min(1,t/.015)*Math.min(1,(duration-t)/.05),sample=Math.sin(2*Math.PI*660*t)*env*volume;view.setInt16(44+i*2,sample*32767,true)}return URL.createObjectURL(new Blob([buffer],{type:'audio/wav'}))}
async function primeIOSAudio(){const a=new Audio(makeWavUrl(.06,.001));a.volume=.01;a.muted=false;try{await a.play();a.pause();URL.revokeObjectURL(a.src);return true}catch(error){try{URL.revokeObjectURL(a.src)}catch{}throw error}}
async function webTone(){try{lastError='None';await primeIOSAudio();const C=audioCtor();if(!C)throw new Error('Web Audio API unavailable.');outerContext=outerContext||new C({latencyHint:'interactive'});if(outerContext.state!=='running')await outerContext.resume();if(outerContext.state!=='running')throw new Error('AudioContext remained '+outerContext.state+'.');const rate=outerContext.sampleRate,length=Math.floor(rate*.7),buffer=outerContext.createBuffer(1,length,rate),data=buffer.getChannelData(0);for(let i=0;i<length;i++){const t=i/rate,env=Math.min(1,t/.02)*Math.min(1,(.7-t)/.12),freq=t<.35?523.25:783.99;data[i]=Math.sin(2*Math.PI*freq*t)*env*.8}const source=outerContext.createBufferSource(),gain=outerContext.createGain();gain.gain.value=1;source.buffer=buffer;source.connect(gain);gain.connect(outerContext.destination);source.start();lastWebResult='Buffer started; context='+outerContext.state+'; frames='+length;setStatus('Web playing','good');showToast('Web Audio buffer started.');source.addEventListener('ended',()=>{lastWebResult+='; ended';setStatus('Web passed','good');updateDiagnostics()},{once:true});sendAudio('test-web')}catch(error){lastError=error?.message||String(error);lastWebResult='FAILED: '+lastError;setStatus('Web failed','bad');showToast(lastError,true)}updateDiagnostics()}
async function wavTone(){try{lastError='None';if(mediaTest){mediaTest.pause();try{URL.revokeObjectURL(mediaTest.src)}catch{}}mediaTest=new Audio(makeWavUrl(.7,.7));mediaTest.preload='auto';mediaTest.volume=1;mediaTest.muted=muted;await mediaTest.play();lastWavResult='play() resolved; paused='+mediaTest.paused;setStatus('WAV playing','good');showToast('WAV playback started.');mediaTest.addEventListener('ended',()=>{lastWavResult+='; ended';setStatus('WAV passed','good');updateDiagnostics()},{once:true});sendAudio('test-media')}catch(error){lastError=error?.message||String(error);lastWavResult='FAILED: '+lastError;setStatus('WAV failed','bad');showToast(lastError,true)}updateDiagnostics()}
function toggleMute(){muted=!muted;muteBtn.textContent=muted?'🔇 Muted':'🔊 On';muteBtn.classList.toggle('bad',muted);muteBtn.classList.toggle('good',!muted);if(mediaTest)mediaTest.muted=muted;if(outerContext)(muted?outerContext.suspend():outerContext.resume()).catch(()=>{});sendAudio(muted?'mute':'unmute');setStatus(muted?'Muted':'Audio on',muted?'bad':'good');updateDiagnostics()}
function detectMode(src,name=''){const ext=(name.split('.').pop()||'').toLowerCase();if(ext==='tsx')return'tsx';if(ext==='jsx')return'jsx';if(/<!doctype\s+html|<html[\s>]|<head[\s>]|<body[\s>]|<style[\s>]|<script[\s>]/i.test(src))return'html';if(/\b(interface|type|enum)\s+\w+|:\s*(string|number|boolean|unknown|any|React\.)\b/.test(src))return'tsx';if(/from\s+['"]react|\b(useState|useEffect|useMemo|useRef)\s*\(|return\s*\([\s\S]*<\w+|export\s+default\s+function/.test(src))return'jsx';return'html'}
function audioBootstrap(){return `<script>(function(){let muted=false,ctx=null;const C=window.AudioContext||window.webkitAudioContext;function report(result,error){parent.postMessage({type:'runner-audio-status',result:result||'',error:error||'',state:ctx&&ctx.state||'not-created',muted},'*')}async function ensure(){if(!C)throw new Error('Web Audio unavailable');ctx=ctx||new C({latencyHint:'interactive'});if(ctx.state!=='running')await ctx.resume();return ctx}async function test(){try{const c=await ensure(),rate=c.sampleRate,len=Math.floor(rate*.5),b=c.createBuffer(1,len,rate),d=b.getChannelData(0);for(let i=0;i<len;i++){const t=i/rate;d[i]=Math.sin(2*Math.PI*700*t)*Math.min(1,t/.02)*Math.min(1,(.5-t)/.08)*.7}const s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start();report('Preview Web Audio buffer started')}catch(e){report('',e.message)}}async function unlock(){try{if(ctx&&ctx.state!=='running'&&!muted)await ctx.resume();document.querySelectorAll('audio,video').forEach(x=>x.muted=muted);report('Preview gesture received')}catch(e){report('',e.message)}}window.addEventListener('message',async e=>{if(e.data?.type!=='runner-audio')return;muted=Boolean(e.data.muted);if(e.data.command==='mute'){if(ctx)await ctx.suspend();document.querySelectorAll('audio,video').forEach(x=>x.muted=true);report('Preview muted')}if(e.data.command==='unmute')await unlock();if(e.data.command==='test-web')await test()});['pointerdown','touchstart','click','keydown'].forEach(x=>document.addEventListener(x,unlock,{capture:true,passive:true}));window.addEventListener('error',e=>parent.postMessage({type:'runner-runtime-error',message:e.message},'*'));report('Preview audio bridge loaded')})();<\/script>`}
function injectHtml(src){const boot=audioBootstrap();if(/<head[\s>]/i.test(src))return src.replace(/<head([^>]*)>/i,'<head$1>'+boot);return boot+src}
function packageUrl(s){if(s==='react')return'https://esm.sh/react@18.3.1?dev';if(s==='react-dom/client')return'https://esm.sh/react-dom@18.3.1/client?dev';return'https://esm.sh/'+s+'?dev&external=react,react-dom'}
function rewriteImports(src){if(/(?:from\s+|import\s*)['"]\.?\.\//.test(src))throw new Error('Relative imports need other project files.');if(/import\s+['"][^'"]+\.css['"]/.test(src))throw new Error('Imported CSS needs a build step.');return src.replace(/(from\s+|import\s*)(['"])(?!https?:|data:|blob:)([^'"]+)\2/g,(m,p,q,s)=>p+q+packageUrl(s)+q)}
function findComponent(src){let m=src.match(/export\s+default\s+function\s+([A-Za-z_$][\w$]*)/);if(m)return{component:m[1],source:src.replace(/export\s+default\s+function\s+([A-Za-z_$][\w$]*)/,'function $1')};m=src.match(/export\s+default\s+([A-Za-z_$][\w$]*)\s*;?/);if(m)return{component:m[1],source:src.replace(m[0],'')};if(/\b(function|const|class)\s+App\b/.test(src))return{component:'App',source:src};throw new Error('Define App or use export default function App().')}
function reactDocument(src,mode){const found=findComponent(src);src=found.source;if(!/import\s+(?:\*\s+as\s+React|React\b)/.test(src))src='import * as React from "react";\n'+src;let presets=[[Babel.availablePresets.react,{runtime:'classic'}]];if(mode==='tsx')presets.push([Babel.availablePresets.typescript,{allExtensions:true,isTSX:true}]);let js=Babel.transform(src,{filename:mode==='tsx'?'App.tsx':'App.jsx',sourceType:'module',presets}).code;js=rewriteImports(js);if(!/createRoot\s*\(|ReactDOM\.render\s*\(/.test(src))js+='\nimport {createRoot as __createRoot} from "https://esm.sh/react-dom@18.3.1/client?dev";\n__createRoot(document.getElementById("root")).render(React.createElement('+found.component+'));';return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+audioBootstrap()+'<style>html,body,#root{min-height:100%;margin:0}body{font-family:system-ui,-apple-system,sans-serif}</style></head><body><div id="root"></div><script type="module">'+js.replace(/<\/script/gi,'<\\/script')+'<\/script></body></html>'}
function buildEducation(src,mode){const out=$('outline'),detail=$('detail'),blocks=[],add=(title,type,re,why)=>{const m=src.match(re);if(m)blocks.push({title,type,why,excerpt:m[0].slice(0,1800)})};add('Detected format',mode.toUpperCase(),/[\s\S]+/,'The runner automatically selected this execution mode.');add('Web Audio','Audio',/(AudioContext|webkitAudioContext|createOscillator|decodeAudioData|createGain|createBuffer)/,'Creates synthesized or decoded audio. iPhone Safari may require media-session priming.');add('Media playback','Audio',/(new\s+Audio|<audio[\s>]|\.play\s*\()/,'Uses standard HTML media playback.');add('Canvas','Graphics',/<canvas[\s>]|getContext\s*\(/,'Draws graphics using Canvas.');add('React state','React',/useState\s*\([^)]*\)/,'Stores state and rerenders the component.');add('Event handling','Input',/(addEventListener\s*\([^)]*\)|on(?:Click|TouchStart|PointerDown|KeyDown)\s*=)/,'Responds to user input.');out.innerHTML='';blocks.forEach((b,i)=>{const x=document.createElement('button');x.className='block';x.innerHTML='<strong>'+b.title+'</strong><small>'+b.type+'</small>';x.onclick=()=>{[...out.children].forEach(y=>y.classList.remove('active'));x.classList.add('active');detail.innerHTML='<span class="pill">'+b.type+'</span><h2>'+b.title+'</h2><p>'+b.why+'</p><pre></pre>';detail.querySelector('pre').textContent=b.excerpt};out.appendChild(x);if(i===0)x.click()})}
function run(name='Pasted Code'){const src=code.value;if(!src.trim()){showToast('Paste or upload code first.',true);return}try{const mode=detectMode(src,name);preview.srcdoc=mode==='html'?injectHtml(src):reactDocument(src,mode);empty.hidden=true;sourceName.textContent=name;meta.textContent=mode.toUpperCase()+' • '+formatBytes(new Blob([src]).size);lastFrameResult='Preview loading';buildEducation(src,mode);setView('preview');setTimeout(()=>sendAudio(muted?'mute':'unmute'),500)}catch(error){lastError=error?.message||String(error);showToast(lastError,true);setView('code')}updateDiagnostics()}
async function pasteAndRun(){try{if(!navigator.clipboard?.readText)throw new Error('Clipboard access unavailable.');const text=await navigator.clipboard.readText();if(!text.trim())throw new Error('Clipboard is empty.');code.value=text;run('Clipboard Paste')}catch(error){lastError=error?.message||String(error);showToast('Clipboard reading was blocked. Tap the code box and use Paste.',true);setView('code');code.focus();updateDiagnostics()}}
window.addEventListener('message',event=>{if(event.source!==preview.contentWindow)return;if(event.data?.type==='runner-audio-status'){lastFrameResult=(event.data.result||'')+' | state='+event.data.state+(event.data.error?' | error='+event.data.error:'');setStatus(event.data.error?'Preview error':event.data.state==='running'?'Game audio':'Preview ready',event.data.error?'bad':'good');updateDiagnostics()}if(event.data?.type==='runner-runtime-error'){lastError='Game: '+event.data.message;showToast(lastError,true);updateDiagnostics()}});
$('pasteBtn').onclick=pasteAndRun;$('startPaste').onclick=pasteAndRun;$('runBtn').onclick=()=>run('Edited Code');$('copyBtn').onclick=async()=>{try{await navigator.clipboard.writeText(code.value);showToast('Copied.')}catch(error){lastError=String(error);showToast('Copy failed.',true)}};$('eraseBtn').onclick=()=>{code.value='';code.focus()};$('clearBtn').onclick=()=>{code.value='';preview.srcdoc='';empty.hidden=false;sourceName.textContent='Ready';meta.textContent='One tap reads your clipboard and runs it.';lastFrameResult='No preview response';setStatus('Idle');setView('code');updateDiagnostics()};$('focusBtn').onclick=()=>document.body.classList.toggle('focus');muteBtn.onclick=toggleMute;$('webAudioBtn').onclick=webTone;$('mediaAudioBtn').onclick=wavTone;$('diagBtn').onclick=()=>{updateDiagnostics();diag.hidden=false};$('closeDiag').onclick=()=>diag.hidden=true;tabs.forEach(t=>t.onclick=()=>setView(t.dataset.view));fileInput.onchange=async()=>{const f=fileInput.files?.[0];if(!f)return;code.value=await f.text();run(f.name)};code.addEventListener('paste',()=>setTimeout(()=>run('Pasted Code'),0));updateDiagnostics();
})();
</script>
</body>
</html>
