<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGA Coding Academy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f4f8;
  color: #1e293b;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: #1e1b4b;
  color: #c7d2fe;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

#sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#sidebar-header h1 {
  font-size: 1.1rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
}

#sidebar-header p {
  font-size: 0.72rem;
  color: #a5b4fc;
  margin-top: 4px;
}

.chapter-label {
  padding: 14px 16px 4px;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #6366f1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  font-size: 0.82rem;
  color: #c7d2fe;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}

.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }

.nav-item.active {
  background: rgba(99,102,241,0.25);
  border-left-color: #6366f1;
  color: #fff;
  font-weight: 600;
}

.nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }

.nav-item .done {
  margin-left: auto;
  font-size: 0.7rem;
  color: #4ade80;
  display: none;
}

.nav-item.done-lesson .done { display: block; }

/* ── MAIN AREA ── */
#main {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

#topbar {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

#topbar-title {
  font-size: 1rem;
  font-weight: 700;
  color: #1e293b;
}

#progress-bar-wrap {
  width: 180px;
  height: 6px;
  background: #e2e8f0;
  border-radius: 99px;
  overflow: hidden;
}

#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #06b6d4);
  border-radius: 99px;
  transition: width 0.4s;
}

#content {
  padding: 32px 40px 60px;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
}

/* ── LESSON ELEMENTS ── */
.lesson-header { margin-bottom: 24px; }

.lesson-tag {
  display: inline-block;
  background: #ede9fe;
  color: #6d28d9;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 99px;
  margin-bottom: 10px;
}

.lesson-title {
  font-size: 1.9rem;
  font-weight: 800;
  color: #0f172a;
  line-height: 1.2;
}

.lesson-subtitle {
  font-size: 1rem;
  color: #64748b;
  margin-top: 6px;
}

/* explanation boxes */
.explain {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
  line-height: 1.7;
  font-size: 0.93rem;
}

.explain p + p { margin-top: 12px; }

.explain strong { color: #4f46e5; }

/* info callout */
.callout {
  display: flex;
  gap: 12px;
  background: #f0f9ff;
  border: 1px solid #bae6fd;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 0.88rem;
  line-height: 1.6;
}

.callout .emoji { font-size: 1.3rem; flex-shrink: 0; }

/* ── CODE BLOCK ── */
.code-wrap {
  margin-bottom: 20px;
}

.code-label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #94a3b8;
  margin-bottom: 6px;
}

pre {
  background: #0f172a;
  color: #e2e8f0;
  border-radius: 10px;
  padding: 20px 22px;
  overflow-x: auto;
  font-size: 0.88rem;
  line-height: 1.7;
  font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
}

.kw  { color: #c084fc; } /* keyword */
.str { color: #86efac; } /* string */
.num { color: #fb923c; } /* number */
.cmt { color: #64748b; font-style: italic; } /* comment */
.fn  { color: #67e8f9; } /* function name */
.key { color: #fbbf24; } /* object key */

/* ── DEMO BOX ── */
.demo-wrap {
  background: #fff;
  border: 2px solid #6366f1;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 28px;
}

.demo-header {
  background: #6366f1;
  color: #fff;
  padding: 8px 18px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.demo-body {
  padding: 20px 24px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 7px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}

.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-secondary { background: #e2e8f0; color: #1e293b; }
.btn-secondary:hover { background: #cbd5e1; }
.btn-sm { padding: 5px 12px; font-size: 0.78rem; }
.btn-red { background: #ef4444; color: #fff; }
.btn-red:hover { background: #dc2626; }
.btn-green { background: #22c55e; color: #fff; }
.btn-green:hover { background: #16a34a; }

/* ── NAVIGATION FOOTER ── */
.lesson-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid #e2e8f0;
}

.lesson-nav .btn { min-width: 130px; }

/* scoreboard demo */
.score-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
}

.score-name { font-weight: 700; min-width: 80px; }
.score-bar-bg { flex: 1; height: 10px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
.score-num { font-weight: 800; min-width: 30px; text-align: right; font-size: 0.9rem; }

/* hand demo */
.hand-area {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 10px;
  background: #f8fafc;
  border-radius: 8px;
  min-height: 80px;
  align-items: center;
}

.demo-card {
  width: 52px;
  height: 72px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.1rem;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 2px solid rgba(0,0,0,0.15);
  box-shadow: 0 2px 5px rgba(0,0,0,0.15);
  user-select: none;
}

.demo-card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
.demo-card.selected { transform: translateY(-10px) scale(1.07); box-shadow: 0 10px 20px rgba(99,102,241,0.4); border-color: #6366f1; }
.demo-card.fuel { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: #fff; }
.demo-card.coolant { background: linear-gradient(135deg, #f87171, #ef4444); color: #fff; }
.demo-card.special { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; }

/* status bar demo */
.status-bar-demo {
  background: linear-gradient(135deg, #1e3a5f, #1e293b);
  border-radius: 8px;
  padding: 12px 16px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.status-bar-msg { flex: 1; font-size: 0.9rem; font-weight: 500; }
.status-bar-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.status-bar-btn.blue { background: #3b82f6; color: #fff; }
.status-bar-btn.blue:hover { background: #2563eb; }
.status-bar-btn.red { background: #ef4444; color: #fff; }
.status-bar-btn.red:hover { background: #dc2626; }
.status-bar-btn.grey { background: #475569; color: #fff; }
.status-bar-btn.grey:hover { background: #334155; }

/* log demo */
.log-area {
  background: #0f172a;
  border-radius: 8px;
  padding: 12px;
  height: 160px;
  overflow-y: auto;
  font-size: 0.78rem;
  font-family: monospace;
}

.log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.log-entry.info { color: #93c5fd; }
.log-entry.warn { color: #fbbf24; }
.log-entry.action { color: #86efac; }
.log-entry.system { color: #94a3b8; }

/* stability meter demo */
.stability-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 60px;
}

.stability-bar-bg {
  width: 30px;
  height: 130px;
  background: #e2e8f0;
  border-radius: 6px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.stability-bar-fill {
  width: 100%;
  border-radius: 4px;
  transition: height 0.4s, background 0.4s;
}

.stability-label {
  font-size: 0.75rem;
  font-weight: 800;
  color: #334155;
}

/* output box for code results */
.output-box {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 10px 14px;
  font-family: monospace;
  font-size: 0.85rem;
  color: #334155;
  min-height: 36px;
}

input[type=range] { cursor: pointer; }
input[type=text], input[type=number] {
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.15s;
}
input[type=text]:focus, input[type=number]:focus { border-color: #6366f1; }

label { font-size: 0.85rem; font-weight: 600; color: #475569; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>🎮 BGA Coding Academy</h1>
    <p>Real patterns from Slambo, Vivo & Frenzy Falls</p>
  </div>
  <div id="nav-tree"></div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="topbar-title">Loading…</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="progress-text" style="font-size:0.78rem;color:#64748b;"></span>
      <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
// ─────────────────────────────────────────────
// LESSON DATA
// ─────────────────────────────────────────────
const LESSONS = [
  // ══ CHAPTER 1 ══
  {
    chapter: true, id: 'ch1', title: 'Chapter 1 — The Basics',
  },
  {
    id: '1-1', icon: '📦', title: 'Variables',
    tag: 'Level 1 · Absolute Beginner',
    subtitle: 'Storing information so code can use it later',
    explain: `
      <p>A <strong>variable</strong> is like a labelled box. You put a value in, give it a name, and refer to it by that name later.</p>
      <p>In JavaScript (the language that runs your BGA game in the browser), you create variables with <strong>const</strong> or <strong>let</strong>.</p>
      <p><strong>const</strong> = the box never changes. Use this by default.<br>
         <strong>let</strong> = the box can be updated. Use when the value needs to change (like a score).</p>
    `,
    callout: '🎮 In Slambo, the card image filenames are stored as <strong>const</strong> variables because the filenames never change. Player scores use <strong>let</strong> because they update every round.',
    code: `<span class="cmt">// From Slambo's Game.js — fixed card info, never changes:</span>
<span class="kw">const</span> CARD_BACK_IMG = <span class="str">'Slambo_Cards_v524.jpg'</span>;
<span class="kw">const</span> CARD_TYPE_FUEL = <span class="str">'1'</span>;
<span class="kw">const</span> CARD_TYPE_COOLANT = <span class="str">'2'</span>;
<span class="kw">const</span> CARD_TYPE_SPECIAL = <span class="str">'3'</span>;

<span class="cmt">// Score that changes during the game:</span>
<span class="kw">let</span> playerScore = <span class="num">0</span>;
playerScore = playerScore + <span class="num">5</span>;  <span class="cmt">// score is now 5</span>
playerScore += <span class="num">3</span>;             <span class="cmt">// score is now 8</span>`,
    demo: 'variables',
    points: ['Use <code>const</code> for values that never change', 'Use <code>let</code> for values that will be updated', 'Give variables CLEAR names — future you will thank you', 'ALL_CAPS with underscores = convention for constants'],
  },
  {
    id: '1-2', icon: '🔢', title: 'Numbers & Strings',
    tag: 'Level 1 · Absolute Beginner',
    subtitle: 'The two most common types of data',
    explain: `
      <p>Data comes in different <strong>types</strong>. The two you'll use most are:</p>
      <p><strong>Numbers</strong> — for counting, calculating, comparing. Card values, scores, zoom levels, player IDs.</p>
      <p><strong>Strings</strong> — text wrapped in quotes. Player names, image filenames, button labels.</p>
      <p>JavaScript is loosely typed, meaning a variable can hold any type. But be careful — <code>"5" + 3</code> gives you <code>"53"</code> (string join), not <code>8</code> (addition). Always convert with <code>Number()</code> when needed.</p>
    `,
    callout: '🎮 Frenzy Falls encodes a whole card into a single number: water×1000 + influence×10 + action. So "card 3214" means 3 water, 2 influence, action 4. One number holds three pieces of info!',
    code: `<span class="cmt">// Numbers</span>
<span class="kw">const</span> cardValue = <span class="num">7</span>;
<span class="kw">const</span> stability = <span class="num">5</span>;
<span class="kw">const</span> newStability = stability + cardValue; <span class="cmt">// 12</span>

<span class="cmt">// Strings</span>
<span class="kw">const</span> playerName = <span class="str">"Alice"</span>;
<span class="kw">const</span> filename = <span class="str">'Slambo_Cards_v5.jpg'</span>;

<span class="cmt">// Frenzy Falls card encoding trick:</span>
<span class="kw">const</span> encoded = <span class="num">3214</span>; <span class="cmt">// water=3, influence=2, action=4</span>
<span class="kw">const</span> water = Math.<span class="fn">floor</span>(encoded / <span class="num">1000</span>);      <span class="cmt">// 3</span>
<span class="kw">const</span> influence = Math.<span class="fn">floor</span>((encoded % <span class="num">1000</span>) / <span class="num">10</span>); <span class="cmt">// 2</span>
<span class="kw">const</span> action = encoded % <span class="num">10</span>;               <span class="cmt">// 4</span>`,
    demo: 'decode',
    points: ['Numbers: no quotes. Strings: always in quotes', 'Number() converts a string to a number', 'Math.floor() rounds down', '% is the "remainder" operator (modulo) — great for extracting digits'],
  },
  {
    id: '1-3', icon: '🗂️', title: 'Objects',
    tag: 'Level 1 · Absolute Beginner',
    subtitle: 'Grouping related data together',
    explain: `
      <p>An <strong>object</strong> is a collection of named values (called <em>properties</em>) grouped under one variable. Think of it like a form with labelled fields.</p>
      <p>You access properties with a dot: <code>card.type</code>, <code>player.name</code>.</p>
      <p>Objects can be nested — an object can contain other objects. The Slambo card image map is an object whose values are themselves objects.</p>
    `,
    callout: '🎮 Slambo uses a big object called CARD_IMAGE_MAP. Each key is a card identifier like "1_3" and the value is an object with the image filename and display label.',
    code: `<span class="cmt">// A player object — groups related info</span>
<span class="kw">const</span> player = {
    <span class="key">id</span>: <span class="num">42</span>,
    <span class="key">name</span>: <span class="str">'Alice'</span>,
    <span class="key">score</span>: <span class="num">0</span>,
    <span class="key">isActive</span>: <span class="kw">true</span>,
};

<span class="cmt">// Access properties with a dot:</span>
console.<span class="fn">log</span>(player.name);   <span class="cmt">// "Alice"</span>
player.score = <span class="num">15</span>;          <span class="cmt">// update a property</span>

<span class="cmt">// From Slambo — card image map (object of objects):</span>
<span class="kw">const</span> CARD_IMAGE_MAP = {
    <span class="key">'1_1'</span>: { <span class="key">img</span>: <span class="str">'Slambo_Cards_v5.jpg'</span>, <span class="key">label</span>: <span class="str">'+1'</span> },
    <span class="key">'1_2'</span>: { <span class="key">img</span>: <span class="str">'Slambo_Cards_v52.jpg'</span>, <span class="key">label</span>: <span class="str">'+2'</span> },
    <span class="key">'2_1'</span>: { <span class="key">img</span>: <span class="str">'Slambo_Cards_v510.jpg'</span>, <span class="key">label</span>: <span class="str">'-1'</span> },
};

<span class="cmt">// Access nested:</span>
<span class="kw">const</span> info = CARD_IMAGE_MAP[<span class="str">'1_2'</span>];
console.<span class="fn">log</span>(info.label); <span class="cmt">// "+2"</span>`,
    demo: 'objects',
    points: ['Objects store related data together', 'Access with dot: <code>obj.property</code>', 'Access with brackets when key is a variable: <code>obj[key]</code>', 'Nested objects = objects inside objects'],
  },
  {
    id: '1-4', icon: '📋', title: 'Arrays',
    tag: 'Level 1 · Absolute Beginner',
    subtitle: 'Ordered lists of values',
    explain: `
      <p>An <strong>array</strong> is an ordered list of values in square brackets. Items are accessed by their position (index), starting at 0.</p>
      <p>Arrays are everywhere in games: the list of players, a hand of cards, zoom level options, the game log history.</p>
      <p>Key array methods: <code>.length</code>, <code>.push()</code> to add, <code>.forEach()</code> to loop.</p>
    `,
    callout: '🎮 The ZOOM_LEVELS array in all three games defines exactly which zoom steps are allowed: [0.5, 0.625, 0.75, 0.875, 1, 1.125, 1.25]. The zoom buttons step through this list.',
    code: `<span class="cmt">// From Slambo — zoom levels array:</span>
<span class="kw">const</span> ZOOM_LEVELS = [<span class="num">0.5</span>, <span class="num">0.625</span>, <span class="num">0.75</span>, <span class="num">0.875</span>, <span class="num">1</span>, <span class="num">1.125</span>, <span class="num">1.25</span>];

<span class="cmt">// Access by index (0-based):</span>
ZOOM_LEVELS[<span class="num">0</span>]; <span class="cmt">// 0.5  (first item)</span>
ZOOM_LEVELS[<span class="num">4</span>]; <span class="cmt">// 1    (fifth item = default zoom)</span>
ZOOM_LEVELS.length; <span class="cmt">// 7</span>

<span class="cmt">// A hand of cards (array of objects):</span>
<span class="kw">let</span> hand = [
    { <span class="key">id</span>: <span class="num">1</span>, <span class="key">type</span>: <span class="str">'fuel'</span>, <span class="key">value</span>: <span class="num">3</span> },
    { <span class="key">id</span>: <span class="num">2</span>, <span class="key">type</span>: <span class="str">'coolant'</span>, <span class="key">value</span>: -<span class="num">2</span> },
];

<span class="cmt">// Add a card:</span>
hand.<span class="fn">push</span>({ <span class="key">id</span>: <span class="num">3</span>, <span class="key">type</span>: <span class="str">'fuel'</span>, <span class="key">value</span>: <span class="num">5</span> });
hand.length; <span class="cmt">// 3</span>`,
    demo: 'arrays',
    points: ['Arrays start at index 0', '<code>.push()</code> adds to end, <code>.pop()</code> removes from end', '<code>.length</code> tells you how many items', 'Arrays of objects = very common in games'],
  },

  // ══ CHAPTER 2 ══
  { chapter: true, id: 'ch2', title: 'Chapter 2 — Logic & Functions' },
  {
    id: '2-1', icon: '🔀', title: 'If / Else',
    tag: 'Level 1 · Absolute Beginner',
    subtitle: 'Making decisions in code',
    explain: `
      <p><strong>if/else</strong> lets code take different paths based on a condition. "If this is true, do this — otherwise, do that."</p>
      <p>Comparisons: <code>===</code> equals, <code>!==</code> not equals, <code>&gt;</code> greater, <code>&lt;</code> less, <code>&gt;=</code> greater or equal.</p>
      <p>You can chain multiple conditions with <code>else if</code>. When you have many options for one value, a <code>switch</code> is cleaner.</p>
    `,
    callout: '🎮 Slambo uses if/else to check whether a played card would push the stability out of range (0–10). If yes, the move helper blocks the play with a warning message.',
    code: `<span class="cmt">// Slambo stability range check:</span>
<span class="kw">const</span> stability = <span class="num">8</span>;
<span class="kw">const</span> cardValue = <span class="num">4</span>;
<span class="kw">const</span> newStability = stability + cardValue; <span class="cmt">// 12</span>

<span class="kw">if</span> (newStability >= <span class="num">0</span> && newStability <= <span class="num">10</span>) {
    console.<span class="fn">log</span>(<span class="str">'Valid play!'</span>);
} <span class="kw">else</span> {
    console.<span class="fn">log</span>(<span class="str">'BUST! Out of range.'</span>);
}

<span class="cmt">// Switch — from Frenzy Falls action names:</span>

    code: `<span class="cmt">// Slambo's smart card overlap algorithm:</span>
<span class="kw">function</span> <span class="fn">updateHandOverlap</span>() {
    <span class="kw">const</span> handEl = document.<span class="fn">getElementById</span>(<span class="str">'slambo-hand'</span>);

        <span class="kw">const</span> save = (cardCount * cardWidth) - available;
        marginLeft = -Math.<span class="fn">ceil</span>(save / (cardCount - <span class="num">1</span>));

// ─────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────
const CONTENT_LESSONS = LESSONS.filter(l => !l.chapter);
let currentId = CONTENT_LESSONS[0].id;
const doneSet = new Set(JSON.parse(localStorage.getItem('teachme_done') || '[]'));

function saveDone() {
  localStorage.setItem('teachme_done', JSON.stringify([...doneSet]));
}

// ─────────────────────────────────────────────
// SIDEBAR BUILDER
// ─────────────────────────────────────────────
function buildSidebar() {
  const tree = document.getElementById('nav-tree');
  tree.innerHTML = '';
  LESSONS.forEach(l => {
    if (l.chapter) {
      const d = document.createElement('div');
      d.className = 'chapter-label';
      d.textContent = l.title;
      tree.appendChild(d);
    } else {
      const d = document.createElement('div');
      d.className = 'nav-item' + (l.id === currentId ? ' active' : '') + (doneSet.has(l.id) ? ' done-lesson' : '');
      d.dataset.id = l.id;
      d.innerHTML = `<span class="icon">${l.icon}</span><span>${l.title}</span><span class="done">✓</span>`;
      d.onclick = () => goTo(l.id);
      tree.appendChild(d);
    }
  });
}

// ─────────────────────────────────────────────
// TOPBAR
// ─────────────────────────────────────────────
function updateTopbar(lesson) {
  document.getElementById('topbar-title').textContent = `${lesson.icon} ${lesson.title}`;
  const done = doneSet.size;
  const total = CONTENT_LESSONS.length;
  document.getElementById('progress-text').textContent = `${done}/${total}`;
  document.getElementById('progress-bar').style.width = `${(done / total) * 100}%`;
}

// ─────────────────────────────────────────────
// LESSON RENDERER
// ─────────────────────────────────────────────
function renderLesson(lesson) {
  const idx = CONTENT_LESSONS.findIndex(l => l.id === lesson.id);
  const prev = CONTENT_LESSONS[idx - 1];
  const next = CONTENT_LESSONS[idx + 1];

  const pointsHtml = lesson.points
    ? `<div class="callout" style="margin-top:0;margin-bottom:20px;background:#f0fdf4;border-color:#bbf7d0">
        <span class="emoji">✅</span>
        <ul style="padding-left:16px;line-height:2">${lesson.points.map(p => `<li>${p}</li>`).join('')}</ul>
       </div>` : '';

  const navHtml = `
    <div class="lesson-nav">
      ${prev ? `<button class="btn btn-secondary" onclick="goTo('${prev.id}')">← ${prev.title}</button>` : '<div></div>'}
      <button class="btn btn-primary" onclick="markDone('${lesson.id}')">✓ Mark complete</button>
      ${next ? `<button class="btn btn-primary" onclick="goTo('${next.id}')">${next.title} →</button>` : '<button class="btn btn-secondary" disabled>End of course</button>'}
    </div>`;

  document.getElementById('content').innerHTML = `
    <div class="lesson-header">
      <div class="lesson-tag">${lesson.tag}</div>
      <div class="lesson-title">${lesson.icon} ${lesson.title}</div>
      <div class="lesson-subtitle">${lesson.subtitle}</div>
    </div>

    <div class="explain">${lesson.explain}</div>

    ${lesson.callout ? `<div class="callout"><span class="emoji">🎮</span><span>${lesson.callout}</span></div>` : ''}

    <div class="code-wrap">
      <div class="code-label">💻 Real Code — From the Games</div>
      <pre>${lesson.code}</pre>
    </div>

    <div class="demo-wrap">
      <div class="demo-header">🎮 Try It — Interactive Demo</div>
      <div class="demo-body" id="demo-body"></div>
    </div>

    ${pointsHtml}
    ${navHtml}
  `;

  renderDemo(lesson.demo);
  updateTopbar(lesson);
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function goTo(id) {
  currentId = id;
  buildSidebar();
  const lesson = LESSONS.find(l => l.id === id);
  renderLesson(lesson);
  document.getElementById('main').scrollTop = 0;
}

function markDone(id) {
  doneSet.add(id);
  saveDone();
  buildSidebar();
  updateTopbar(LESSONS.find(l => l.id === id));
  const btn = document.querySelector('.lesson-nav .btn-primary:first-of-type');
  if (btn) { btn.textContent = '✓ Completed!'; btn.style.background = '#22c55e'; }
}

function demoDecode(el) {

  function runDecode() {
    const v = parseInt(document.getElementById('encoded-val').value) || 0;

    document.getElementById('decode-out').textContent =
      `Encoded: ${v}\nwater     = Math.floor(${v} / 1000) = ${water}\ninfluence = Math.floor((${v} % 1000) / 10) = ${influence}\naction    = ${v} % 10 = ${action}  →  ${actions[action] || 'unknown'}`;
  }
  runDecode();
}

// ── DEMO: Loops ─────────────────────────────────
function demoLoops(el) {
  const players = [
    {id:1,name:'Alice',score:15,eliminated:false},
    {id:2,name:'Bob',score:8,eliminated:true},
    {id:3,name:'Carol',score:22,eliminated:false},
  ];
  el.innerHTML = `
    <p style="font-size:0.85rem;color:#475569;margin-bottom:12px">Choose a loop method to process the players array:</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <button class="btn btn-secondary btn-sm" onclick="runLoop('forEach')">forEach</button>
      <button class="btn btn-secondary btn-sm" onclick="runLoop('map')">map (names)</button>
      <button class="btn btn-secondary btn-sm" onclick="runLoop('filter')">filter (alive)</button>
      <button class="btn btn-secondary btn-sm" onclick="runLoop('for')">for loop with index</button>
    </div>
    <div class="output-box" id="loop-out" style="white-space:pre"></div>
  `;
  window.runLoop = (type) => {
    let out = '';
    if (type === 'forEach') {
      out = 'players.forEach(p => log(p.name + ": " + p.score)):\n';
      players.forEach(p => out += `  ${p.name}: ${p.score} pts\n`);
    } else if (type === 'map') {
      const names = players.map(p => p.name);
      out = `players.map(p => p.name):\n  → ${JSON.stringify(names)}`;
    } else if (type === 'filter') {
      const alive = players.filter(p => !p.eliminated);
      out = `players.filter(p => !p.eliminated):\n  → ${alive.map(p=>p.name).join(', ')} (${alive.length} players)`;
    } else {
      out = 'for (let i=0; i<players.length; i++):\n';
      for (let i = 0; i < players.length; i++) out += `  [${i}] ${players[i].name}\n`;
    }
    document.getElementById('loop-out').textContent = out;
  };
}

// ── DEMO: Game Area ─────────────────────────────
function demoGameArea(el) {
  let stability = 5;
  const cardDefs = [
    {label:'+3',val:3,type:'fuel'},{label:'+5',val:5,type:'fuel'},
    {label:'−2',val:-2,type:'coolant'},{label:'−4',val:-4,type:'coolant'},
    {label:'±7',val:7,type:'special'},
  ];
  function gaRender() {
    const pct = (stability / 10) * 100;
    const color = stability <= 2 ? '#ef4444' : stability >= 8 ? '#ef4444' : '#22c55e';
    return `
      <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
        <div style="text-align:center">
          <div style="font-size:0.72rem;font-weight:700;color:#64748b;margin-bottom:4px">STABILITY</div>
          <div class="stability-wrap">
            <div class="stability-bar-bg"><div class="stability-bar-fill" style="height:${pct}%;background:${color}"></div></div>
            <div class="stability-label">${stability}/10</div>
          </div>
        </div>
        <div style="flex:1;min-width:180px">
          <div style="font-size:0.72rem;font-weight:700;color:#64748b;margin-bottom:8px">YOUR HAND — click to play:</div>
          <div class="hand-area" style="gap:8px">
            ${cardDefs.map(c=>`<div class="demo-card ${c.type}" onclick="gaPlay(${c.val},'${c.label}')" title="Play ${c.label}">${c.label}</div>`).join('')}
          </div>
        </div>
      </div>
      <div class="output-box" id="ga-log" style="margin-top:12px;font-size:0.8rem"></div>
    `;
  }
  el.innerHTML = gaRender();
  window.gaPlay = (val, label) => {
    const prev = stability;
    stability = prev + val;
    let msg;
    if (stability < 0 || stability > 10) {
      msg = `💥 BUST! ${prev} + ${label} = ${stability} — out of range!`;
      stability = prev;
    } else {
      msg = `✅ Played ${label}: stability ${prev} → ${stability}`;
    }
    el.innerHTML = gaRender();
    document.getElementById('ga-log').textContent = msg;
  };
}

      btns.appendChild(b);

      addBtn('+7', 'blue', () => sbScenario('confirm'));
      addBtn('−7', 'red', () => sbScenario('confirm'));
      addBtn('Cancel', 'grey', () => sbScenario('play'));
    } else if (s === 'confirm') {
      let t = 5;
      msg.textContent = `Confirm play +7 — auto-confirms in ${t}s`;
      addBtn('Confirm ✓', 'blue', () => { msg.textContent = '✅ Card played!'; btns.innerHTML = ''; });
      addBtn('Cancel', 'red', () => sbScenario('play'));
      const timer = setInterval(() => {
        t--;
        if (document.getElementById('sb-msg')) {
          msg.textContent = `Confirm play +7 — auto-confirms in ${t}s`;
          if (t <= 0) { clearInterval(timer); msg.textContent = '✅ Auto-confirmed!'; btns.innerHTML = ''; }
        } else clearInterval(timer);
      }, 1000);
    }
  };
}

function demoStateMachine(el) {
  const states = {
    idle:      { label: 'Idle / Waiting',    color: '#94a3b8', next: ['playerTurn'] },
    playerTurn:{ label: 'Player Turn',       color: '#3b82f6', next: ['choosingCard','waiting'] },
    choosingCard:{ label: 'Choosing Card',   color: '#f59e0b', next: ['confirming','playerTurn'] },
    confirming:{ label: 'Confirming Play',   color: '#8b5cf6', next: ['waiting','playerTurn'] },
    waiting:   { label: 'Waiting for Others',color: '#64748b', next: ['playerTurn','gameOver'] },
    gameOver:  { label: 'Game Over',         color: '#ef4444', next: [] },
  };
  let current = 'idle';
  function smRender() {
    const s = states[current];
    const transitions = s.next.map(n =>
      `<button class="btn btn-sm btn-secondary" onclick="smGo('${n}')">→ ${states[n].label}</button>`
    ).join('');
    el.innerHTML = `
      <p style="font-size:0.82rem;color:#475569;margin-bottom:12px">Current state: <strong style="color:${s.color}">${s.label}</strong></p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        ${Object.entries(states).map(([k,v])=>
          `<div style="padding:6px 12px;border-radius:99px;font-size:0.75rem;font-weight:700;background:${k===current?v.color:'#e2e8f0'};color:${k===current?'#fff':'#64748b'};transition:all 0.2s">${v.label}</div>`
        ).join('')}
      </div>
      <div style="margin-bottom:12px">
        <span style="font-size:0.82rem;color:#475569">Transition to:</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">${transitions || '<span style="font-size:0.82rem;color:#94a3b8">No transitions (end state)</span>'}</div>
      </div>
      <div class="output-box" id="sm-log"></div>
    `;
  }
  window.smGo = (next) => {
    const prev = current;
    current = next;
    smRender();
    document.getElementById('sm-log').textContent =
      `onLeavingState('${prev}') called\nonEnteringState('${next}') called\nNew state: ${states[next].label}`;
  };
  smRender();
}

        <input type="text" id="tl-card" value="+5" style="width:80px">

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <label style="min-width:100px">New stability:</label>
        <input type="number" id="tl-stab" value="10" min="0" max="10" style="width:70px">
      </div>
    </div>
    <div style="margin-bottom:8px">
      <div class="code-label">Template literal source:</div>
      <pre style="font-size:0.8rem;padding:12px 16px"><span class="str">\`\${playerName} played \${card} — stability is now \${stability}\`</span></pre>
    </div>
    <div>
      <div class="code-label">Output (what the player sees):</div>
      <div class="output-box" id="tl-out" style="font-size:1rem;font-weight:600;color:#1e293b;min-height:42px;padding:12px 14px"></div>
    </div>
    <div style="margin-top:12px">
      <div class="code-label">HTML template (multi-line):</div>
      <div class="output-box" id="tl-html" style="font-size:0.75rem;white-space:pre;line-height:1.6"></div>
    </div>
  `;
  function update() {
    const name = document.getElementById('tl-name').value || 'Player';
    const card = document.getElementById('tl-card').value || '?';
    const stab = document.getElementById('tl-stab').value || '0';
    document.getElementById('tl-out').textContent = `${name} played ${card} — stability is now ${stab}`;
    document.getElementById('tl-html').textContent =
      `<div class="score-row" data-player="${name}">\n  <span class="name">${name}</span>\n  <span class="score">${stab}/10</span>\n</div>`;
  }
  ['tl-name','tl-card','tl-stab'].forEach(id => document.getElementById(id).oninput = update);
  update();
}

// ── DEMO: Mini Game ─────────────────────────────
function demoMinigame(el) {
  // ① CONSTANTS
  const RANGE = { min: 0, max: 10 };
  const CARD_DEFS = [
    { label:'+1', value:1,  type:'fuel' },
    { label:'+2', value:2,  type:'fuel' },
    { label:'+3', value:3,  type:'fuel' },
    { label:'+5', value:5,  type:'fuel' },
    { label:'-1', value:-1, type:'coolant' },
    { label:'-2', value:-2, type:'coolant' },
    { label:'-3', value:-3, type:'coolant' },
    { label:'-4', value:-4, type:'coolant' },
  ];
  const PLAYERS = [
    { id:'you', name:'YOU', color:'#6366f1' },
    { id:'ai',  name:'AI',  color:'#ef4444' },
  ];

  // ② GAME STATE (let = changes)
  let stability = 5;
  let gameState = 'playerTurn'; // playerTurn | aiTurn | gameOver
  let playerHand = [];
  let aiHand = [];
  let scores = { you: 0, ai: 0 };
  let round = 1;

  // ③ FUNCTIONS
  function dealHand(size) {
    return Array.from({ length: size }, () => ({ ...CARD_DEFS[Math.floor(Math.random() * CARD_DEFS.length)] }));
  }

  function wouldBust(value) {
    const result = stability + value;
    return result < RANGE.min || result > RANGE.max;
  }

  function addLog(msg, type = 'info') {
    const area = document.getElementById('mg-log');
    if (!area) return;
    const div = document.createElement('div');
    div.className = `log-entry ${type}`;
    div.textContent = msg;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function updateUI() {
    // Stability meter
    const pct = (stability / 10) * 100;
    const color = (stability <= 1 || stability >= 9) ? '#ef4444' : stability <= 3 || stability >= 7 ? '#f59e0b' : '#22c55e';
    const fillEl = document.getElementById('mg-stab-fill');
    const numEl  = document.getElementById('mg-stab-num');
    if (fillEl) { fillEl.style.height = pct + '%'; fillEl.style.background = color; }
    if (numEl)  numEl.textContent = stability;

    // Status bar message
    const msgEl = document.getElementById('mg-status-msg');
    const btnsEl = document.getElementById('mg-status-btns');
    if (!msgEl || !btnsEl) return;
    btnsEl.innerHTML = '';

    if (gameState === 'playerTurn') {
      msgEl.textContent = '🎮 YOUR TURN — click a card to play it';
      renderHand('mg-player-hand', playerHand, true);
    } else if (gameState === 'aiTurn') {
      msgEl.textContent = '🤖 AI is thinking...';
      renderHand('mg-player-hand', playerHand, false);
    } else {
      msgEl.textContent = '🏁 Round over — click New Round';
      renderHand('mg-player-hand', playerHand, false);
      const btn = document.createElement('button');
      btn.className = 'status-bar-btn blue';
      btn.textContent = 'New Round';
      btn.onclick = startRound;
      btnsEl.appendChild(btn);
    }

    // AI hand (always face-down)
    renderHand('mg-ai-hand', aiHand, false, true);

    // Scores
    const scEl = document.getElementById('mg-scores');
    if (scEl) scEl.innerHTML = PLAYERS.map(p =>
      `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:800;color:${p.color};min-width:36px">${p.name}</span>
        <span style="font-weight:700">${scores[p.id]} pts</span>
        ${gameState !== 'gameOver' && p.id === (gameState === 'playerTurn' ? 'you' : 'ai') ? '<span style="font-size:0.7rem;background:#22c55e;color:#fff;padding:1px 7px;border-radius:99px">TURN</span>' : ''}
       </div>`
    ).join('');
  }

  function renderHand(containerId, hand, clickable, faceDown = false) {
    const el2 = document.getElementById(containerId);
    if (!el2) return;
    el2.innerHTML = '';
    hand.forEach((card, i) => {
      const div = document.createElement('div');
      if (faceDown) {
        div.className = 'demo-card';
        div.style.background = 'linear-gradient(135deg,#334155,#1e293b)';
        div.style.color = '#94a3b8';
        div.textContent = '?';
      } else {
        div.className = `demo-card ${card.type}`;
        div.textContent = card.label;
        if (clickable) {
          const bust = wouldBust(card.value);
          if (bust) div.style.opacity = '0.45';
          div.style.cursor = bust ? 'not-allowed' : 'pointer';
          div.title = bust ? 'This would bust!' : `Play ${card.label} → stability ${stability + card.value}`;
          if (!bust) div.onclick = () => playerPlay(i);
        }
      }
      el2.appendChild(div);
    });
  }

  // ④ GAME ACTIONS (state machine transitions)
  function playerPlay(handIndex) {
    if (gameState !== 'playerTurn') return;
    const card = playerHand[handIndex];
    if (wouldBust(card.value)) return;

    const prev = stability;
    stability += card.value;
    playerHand.splice(handIndex, 1);
    addLog(`YOU played ${card.label}: stability ${prev} → ${stability}`, 'action');

    if (playerHand.length === 0) { endRound('ai', 'You ran out of cards'); return; }

    gameState = 'aiTurn';
    updateUI();
    setTimeout(aiPlay, 900);
  }

  function aiPlay() {
    if (gameState !== 'aiTurn') return;

    // AI logic: prefer safe cards; pick lowest-impact safe card
    const safe = aiHand.filter(c => !wouldBust(c.value));
    let chosen;
    if (safe.length > 0) {
      // Pick the card that leaves stability closest to middle (5)
      chosen = safe.sort((a, b) =>
        Math.abs((stability + a.value) - 5) - Math.abs((stability + b.value) - 5)
      )[0];
    } else {
      // No safe card — AI must bust
      chosen = aiHand[0];
      const result = stability + chosen.value;
      stability = result;
      const aiIdx = aiHand.indexOf(chosen);
      aiHand.splice(aiIdx, 1);
      addLog(`AI played ${chosen.label}: stability ${stability - chosen.value} → ${stability} 💥`, 'warn');
      endRound('you', 'AI busted!');
      return;
    }

    const prev = stability;
    stability += chosen.value;
    const aiIdx = aiHand.indexOf(chosen);
    aiHand.splice(aiIdx, 1);
    addLog(`AI played ${chosen.label}: stability ${prev} → ${stability}`, 'system');

    if (aiHand.length === 0) { endRound('you', 'AI ran out of cards'); return; }

    gameState = 'playerTurn';
    updateUI();
  }

  function endRound(winner, reason) {
    scores[winner]++;
    gameState = 'gameOver';
    addLog(`— Round ${round} over: ${reason}. ${winner.toUpperCase()} wins! —`, 'warn');
    round++;
    updateUI();
  }

  function startRound() {
    stability = 5;
    playerHand = dealHand(4);
    aiHand = dealHand(4);
    gameState = 'playerTurn';
    addLog(`— Round ${round} started — stability: 5 —`, 'system');
    updateUI();
  }

  // ⑤ BUILD THE HTML STRUCTURE
  el.innerHTML = `
    <style>
      #mg-wrap { display:flex; flex-direction:column; gap:12px; }
      #mg-top  { display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap; }
      .mg-panel { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:12px 14px; }
      .mg-label { font-size:0.68rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#94a3b8; margin-bottom:8px; }
      #mg-stab-bg { width:28px; height:120px; background:#e2e8f0; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
      #mg-stab-fill { width:100%; transition:height 0.4s, background 0.4s; border-radius:4px; }
    </style>
    <div id="mg-wrap">
      <div id="mg-top">
        <!-- Scoreboard -->
        <div class="mg-panel" style="min-width:130px">
          <div class="mg-label">🏆 Scores</div>
          <div id="mg-scores"></div>
        </div>
        <!-- Stability -->
        <div class="mg-panel" style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div class="mg-label">Stability</div>
          <div id="mg-stab-bg"><div id="mg-stab-fill"></div></div>
          <div id="mg-stab-num" style="font-weight:900;font-size:1.1rem;color:#1e293b"></div>
          <div style="font-size:0.65rem;color:#94a3b8">0–10</div>
        </div>
        <!-- AI hand -->
        <div class="mg-panel" style="flex:1;min-width:160px">
          <div class="mg-label">🤖 AI Hand (face-down)</div>
          <div class="hand-area" id="mg-ai-hand" style="min-height:80px"></div>
        </div>
      </div>
      <!-- Your hand -->
      <div class="mg-panel">
        <div class="mg-label">🤚 Your Hand — click a card (faded = would bust)</div>
        <div class="hand-area" id="mg-player-hand" style="min-height:80px"></div>
      </div>
      <!-- Status bar -->
      <div class="status-bar-demo" style="flex-wrap:wrap;gap:10px">
        <span class="status-bar-msg" id="mg-status-msg"></span>
        <div id="mg-status-btns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <!-- Log -->
      <div class="log-area" id="mg-log" style="height:110px"></div>
    </div>
  `;

  // ⑥ START
  startRound();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildSidebar();
goTo(CONTENT_LESSONS[0].id);
</script>
