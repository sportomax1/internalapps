<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Apps | Secure Portal</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #007aff;
            --primary-glow: rgba(0, 122, 255, 0.3);
            --bg: #0a0a0a;
            --surface: rgba(25, 25, 25, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-secondary: #a1a1a1;
            --accent-gradient: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: blur(100px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #007aff;
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: #5856d6;
            bottom: -150px;
            right: -100px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #ff2d55;
            top: 40%;
            left: 60%;
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.1); }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 40px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .app-card {
            position: relative;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            overflow: hidden;
            cursor: pointer;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .app-card:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: rgba(0, 122, 255, 0.5);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 
                        0 0 15px var(--primary-glow);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-icon-wrapper {
            width: 48px;
            height: 48px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
        }

        .app-card:hover .app-icon-wrapper {
            transform: scale(1.12);
            background: var(--accent-gradient);
            border-color: rgba(255,255,255,0.2);
        }

        .app-name {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.2;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-desc {
            display: none;
        }

        .card-footer {
            display: none;
        }

        .status-tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #34c759;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #34c759;
            border-radius: 50%;
            box-shadow: 0 0 8px #34c759;
            animation: pulse 2s infinite;
        }

        .arrow-link {
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: auto;
            animation: fadeIn 1s ease-out 0.5s backwards;
        }

        .status-bar {
            display: none;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .apps-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
            .app-icon-wrapper { width: 40px; height: 40px; font-size: 20px; }
            .app-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">🔐</div>
            <h1>Internal Apps</h1>
            <p class="subtitle">Quick access to your tools.</p>
        </header>

        <div class="apps-grid">
            <a href="/tracking/" class="app-card">
                <div class="app-icon-wrapper">📍</div>
                <div class="app-name">Activity Tracker</div>
            </a>

            <a href="/oura/" class="app-card">
                <div class="app-icon-wrapper">🚀</div>
                <div class="app-name">Oura Explorer</div>
            </a>

            <a href="/tools/font" class="app-card">
                <div class="app-icon-wrapper">🔡</div>
                <div class="app-name">Typography</div>
            </a>

            <a href="/tools/iphone" class="app-card">
                <div class="app-icon-wrapper">📱</div>
                <div class="app-name">iOS Sim</div>
            </a>

            <a href="/tools/desktop" class="app-card">
                <div class="app-icon-wrapper">🖥️</div>
                <div class="app-name">Desktop Sim</div>
            </a>

            <a href="/tools/screensavers" class="app-card">
                <div class="app-icon-wrapper">✨</div>
                <div class="app-name">Screensavers</div>
            </a>

            <a href="/4runner-drive/" class="app-card">
                <div class="app-icon-wrapper">4R</div>
                <div class="app-name">4Runner Drive</div>
            </a>

            <a href="sweet16.html" class="app-card">
                <div class="app-icon-wrapper">🎮</div>
                <div class="app-name">Sweet 16</div>
            </a>

            <a href="photo-analyzer.html" class="app-card">
                <div class="app-icon-wrapper">🖼️</div>
                <div class="app-name">Photo Analyzer</div>
            </a>

            <a href="/tools/bga-studio-teach" class="app-card">
                <div class="app-icon-wrapper">🎲</div>
                <div class="app-name">BGA Studio Teach</div>
            </a>

             <a href="mybox.html" class="app-card">
                <div class="app-icon-wrapper">🎲</div>
                <div class="app-name">My Box</div>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 Internal Apps</p>
        </footer>
    </div>
</body>
</html>
