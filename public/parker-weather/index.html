<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#007aff">
  <title>Parker Weather</title>
  <style>
    :root {
      color-scheme: light dark;
      --blue: #007aff;
      --cyan: #39d2ff;
      --white: #ffffff;
      --text: #101114;
      --secondary: rgba(60,60,67,.72);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      min-height: 100svh;
      background: linear-gradient(135deg, #007aff 0%, #34c7ff 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .app {
      min-height: 100svh;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
    }

    .content {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 22px;
    }

    .hero { text-align: center; }
    .monkey { font-size: 72px; line-height: 1; margin-bottom: 12px; }
    h1 { margin: 0; color: white; font-size: clamp(34px, 8vw, 44px); line-height: 1.05; letter-spacing: -.04em; }
    .subtitle { margin: 10px 0 0; color: rgba(255,255,255,.8); font-size: 17px; font-weight: 600; }

    .card {
      width: 100%;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(255,255,255,.48);
      box-shadow: 0 20px 60px rgba(0,65,150,.22);
      backdrop-filter: blur(28px) saturate(150%);
      -webkit-backdrop-filter: blur(28px) saturate(150%);
      text-align: center;
    }

    .weather-symbol { font-size: 68px; line-height: 1; margin-bottom: 12px; }
    .condition { font-size: 24px; font-weight: 750; letter-spacing: -.02em; }
    .temperature { margin: 8px 0 14px; font-size: clamp(58px, 16vw, 74px); font-weight: 800; letter-spacing: -.05em; }

    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { padding: 12px; border-radius: 16px; background: rgba(255,255,255,.48); }
    .metric-label { color: var(--secondary); font-size: 12px; }
    .metric-value { margin-top: 5px; font-size: 17px; font-weight: 700; }
    .updated { margin-top: 16px; color: var(--secondary); font-size: 12px; }

    .button {
      appearance: none;
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      background: white;
      color: var(--blue);
      font: inherit;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(0,75,180,.24);
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    .button:active { transform: scale(.98); }
    .button:disabled { opacity: .7; cursor: default; }

    .credit { text-align: center; color: rgba(255,255,255,.75); font-size: 12px; }
    .status { min-height: 220px; display: grid; place-items: center; color: #222; }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid rgba(0,122,255,.2); border-top-color: var(--blue);
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-height: 700px) {
      .app { padding-top: max(16px, env(safe-area-inset-top)); }
      .content { gap: 14px; }
      .monkey { font-size: 54px; margin-bottom: 6px; }
      h1 { font-size: 34px; }
      .card { padding: 18px; }
      .weather-symbol { font-size: 52px; }
      .temperature { font-size: 54px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="content" aria-live="polite">
      <header class="hero">
        <div class="monkey" aria-hidden="true">🐒</div>
        <h1>Parker Weather</h1>
        <p class="subtitle">80134 • Current conditions</p>
      </header>

      <div id="weatherCard" class="card status">
        <div>
          <div class="spinner"></div>
          <div>Loading weather…</div>
        </div>
      </div>

      <button id="refreshButton" class="button" type="button">↻&nbsp;&nbsp;Refresh Weather</button>
      <div class="credit">Weather data from Open-Meteo</div>
    </section>
  </main>

  <script>
    const weatherCard = document.getElementById('weatherCard');
    const refreshButton = document.getElementById('refreshButton');

    const weatherMap = {
      0: ['Clear sky', '☀️'], 1: ['Mainly clear', '🌤️'], 2: ['Partly cloudy', '⛅'], 3: ['Overcast', '☁️'],
      45: ['Foggy', '🌫️'], 48: ['Foggy', '🌫️'],
      51: ['Drizzle', '🌦️'], 53: ['Drizzle', '🌦️'], 55: ['Drizzle', '🌦️'], 56: ['Drizzle', '🌦️'], 57: ['Drizzle', '🌦️'],
      61: ['Rain', '🌧️'], 63: ['Rain', '🌧️'], 65: ['Rain', '🌧️'], 66: ['Rain', '🌧️'], 67: ['Rain', '🌧️'],
      71: ['Snow', '🌨️'], 73: ['Snow', '🌨️'], 75: ['Snow', '🌨️'], 77: ['Snow', '🌨️'],
      80: ['Rain showers', '🌦️'], 81: ['Rain showers', '🌦️'], 82: ['Rain showers', '🌦️'],
      85: ['Snow showers', '🌨️'], 86: ['Snow showers', '🌨️'],
      95: ['Thunderstorms', '⛈️'], 96: ['Thunderstorms', '⛈️'], 99: ['Thunderstorms', '⛈️']
    };

    function rounded(value) { return Math.round(Number(value)); }

    function renderWeather(current) {
      const [condition, symbol] = weatherMap[current.weather_code] || ['Current weather', '🌡️'];
      const updated = new Intl.DateTimeFormat(undefined, { hour: 'numeric', minute: '2-digit' }).format(new Date());
      weatherCard.classList.remove('status');
      weatherCard.innerHTML = `
        <div class="weather-symbol" aria-hidden="true">${symbol}</div>
        <div class="condition">${condition}</div>
        <div class="temperature">${rounded(current.temperature_2m)}°F</div>
        <div class="metrics">
          <div class="metric"><div class="metric-label">Feels like</div><div class="metric-value">${rounded(current.apparent_temperature)}°</div></div>
          <div class="metric"><div class="metric-label">Wind</div><div class="metric-value">${rounded(current.wind_speed_10m)} mph</div></div>
        </div>
        <div class="updated">Updated ${updated}</div>`;
    }

    function renderError(message) {
      weatherCard.classList.add('status');
      weatherCard.innerHTML = `<div><div style="font-size:44px">📶</div><h2 style="margin:12px 0 8px;font-size:20px">Couldn’t load weather</h2><div style="color:var(--secondary);font-size:14px">${message}</div></div>`;
    }

    async function loadWeather() {
      refreshButton.disabled = true;
      refreshButton.textContent = 'Refreshing…';
      try {
        const url = new URL('https://api.open-meteo.com/v1/forecast');
        url.search = new URLSearchParams({
          latitude: '39.5186', longitude: '-104.7614',
          current: 'temperature_2m,apparent_temperature,weather_code,wind_speed_10m',
          temperature_unit: 'fahrenheit', wind_speed_unit: 'mph', timezone: 'America/Denver'
        });
        const response = await fetch(url);
        if (!response.ok) throw new Error('Open-Meteo returned an unexpected response.');
        const payload = await response.json();
        renderWeather(payload.current);
      } catch (error) {
        renderError(error?.message || 'Unable to connect.');
      } finally {
        refreshButton.disabled = false;
        refreshButton.innerHTML = '↻&nbsp;&nbsp;Refresh Weather';
      }
    }

    refreshButton.addEventListener('click', loadWeather);
    loadWeather();
  </script>
</body>
</html>
