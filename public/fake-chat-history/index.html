<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Fake Chat History</title><style>* { box-sizing: border-box; } body { margin: 0; font-family: system-ui; background: #0f172a; color: #e5e7eb; }</style></head><body><script>const chats=[{title:'AI Advice Hour 22',preview:'Ask for a sanity check 🦊',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Ask AI to do a quick sanity check on your plan before you start. It can catch missing steps, vague goals, and sneaky assumptions. 🦊']]},{title:'AI Advice Hour 21',preview:'Ask for risks 🧭',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Before using an AI answer, ask it to identify the biggest risks, unknowns, and what would change its recommendation. 🧭']]},{title:'AI Advice Hour 20',preview:'Ask for reusable templates 🧰',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Ask AI to turn a good answer into a reusable template you can paste next time. It saves time and keeps your prompts consistent. 🧰']]},{title:'AI Advice Hour 19',preview:'Ask for tradeoffs 🌟',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Ask AI to explain the tradeoffs between two good options instead of only picking a winner. Better decisions usually come from seeing what you give up. 🌟']]},{title:'AI Advice Hour 18',preview:'Name the audience 🦉',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Tell AI who the answer is for before asking it to explain or recommend something. A beginner, expert, manager, or customer may need totally different wording. 🦉']]},{title:'AI Advice Hour 17',preview:'Request examples 💡',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Ask AI to provide concrete examples alongside explanations. Examples make it easier to spot gaps and turn ideas into action. 💡']]},{title:'AI Advice Hour 16',preview:'Generate tests 🧪',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Before writing code, ask AI to generate test cases first. It often reveals edge cases and requirements you might miss. 🧪']]},{title:'AI Advice Hour 15',preview:'Find counterexamples 🔬',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Ask AI for counterexamples that would break its recommendation before you implement it. 🔬']]},{title:'AI Advice Hour 14',preview:'Use constraints 🎯',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Give AI explicit constraints like budget, time, and priorities before asking for recommendations. Results are usually much better. 🎯']]},{title:'AI Advice Hour 13',preview:'Question your answer 🧠',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','After getting an answer, ask AI what the strongest argument against its recommendation would be. This often surfaces blind spots. 🧠']]},{title:'AI Advice Hour 12',preview:'Challenge assumptions 🧩',date:'2026-06-23',messages:[['user','Any new AI tip today?'],['bot','Ask AI to list the assumptions behind its answer and identify which assumptions are most likely to be wrong. 🧩']]}];</script></body></html>
