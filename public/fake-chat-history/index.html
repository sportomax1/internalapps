<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Chat History</title>
  <style>* { box-sizing: border-box; } body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; } .app { display: grid; grid-template-columns: 310px 1fr; height: 100vh; } aside { background: #111827; padding: 18px; border-right: 1px solid #334155; overflow-y: auto; } main { display: flex; flex-direction: column; min-width: 0; } h1 { margin: 0 0 14px; font-size: 22px; } .search { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: white; margin-bottom: 14px; } .chat { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; color: #e5e7eb; border-radius: 14px; padding: 12px; cursor: pointer; margin-bottom: 8px; } .chat:hover,.chat.active { background: #1f2937; border-color: #334155; }</style>
</head><body><div class="app"><aside><h1>Fake Chat History</h1><input id="search" class="search" placeholder="Search chats..." /><div id="chatList"></div></aside><main><header><h2 id="title">No chats yet</h2><p id="meta">The daily job will add the next fake chat.</p></header><section id="messages"></section><form id="composer"><input id="input" placeholder="Type a fake reply..." /><button>Send</button></form></main></div><script>
const chats=[{title:'AI Advice Hour 8',preview:'Ask for edge cases 🧪',date:'2026-06-22',messages:[['user','What AI tip should I try today?'],['bot','Ask AI to list edge cases, failure modes, and exceptions before implementing a solution. It often uncovers issues early. 🧪']]},{title:'AI Advice Hour 7',preview:'Chain prompts wisely 🧭',date:'2026-06-22',messages:[['user','Any new AI advice?'],['bot','Break complex tasks into multiple prompts instead of one giant prompt. Step-by-step workflows usually produce better results. 🧭']]},{title:'AI Advice Hour 6',preview:'Compare options 🦉',date:'2026-06-22',messages:[['user','Give me a fresh AI tip.'],['bot','Ask AI to generate 3 options and explain the tradeoffs between them. Comparing alternatives often leads to better decisions. 🦉']]},{title:'AI Advice Hour 5',preview:'Give AI a role 🎯',date:'2026-06-22',messages:[['user','Newest AI tip?'],['bot','Assign AI a role such as product manager, teacher, or tester before asking a question. It often produces more focused results. 🎯']]},{title:'AI Advice Hour 4',preview:'Refine prompts 🔍',date:'2026-06-22',messages:[['user','One more AI tip?'],['bot','Treat prompting as an iterative process. After the first answer, ask AI to improve, simplify, or critique its own response. 🔍']]},{title:'AI Advice Hour 3',preview:'Ask for examples 🚀',date:'2026-06-22',messages:[['user','What is another AI tip?'],['bot','When prompting AI, ask for 3 examples. Concrete examples often improve accuracy and make results easier to use. 🚀']]},{title:'AI Advice Hour 2',preview:'Ask AI for constraints 🧠',date:'2026-06-21',messages:[['user','Another AI tip?'],['bot','Give AI clear constraints such as budget, time, or goals. Better constraints usually produce better answers. 🧠']]},{title:'AI Advice Hour',preview:'Use AI to create first drafts 🤖',date:'2026-06-21',messages:[['user','Give me a quick AI tip.'],['bot','Use AI for the first draft, then spend your time editing and improving the result instead of starting from a blank page. 🤖']]},{title:'Parker Weather Check',preview:'Warm June morning ☀️',date:'2026-06-21',messages:[['user','What is the weather in Parker today?'],['bot','Parker is looking warm and pleasant today, around the low 80s°F with sunshine and a few clouds. ☀️']]}];
let selected=0;const chatList=document.getElementById('chatList');const search=document.getElementById('search');const title=document.getElementById('title');const meta=document.getElementById('meta');const messages=document.getElementById('messages');function renderList(){const term=search.value.toLowerCase();chatList.innerHTML='';chats.forEach((chat,index)=>{if(!chat.title.toLowerCase().includes(term)&&!chat.preview.toLowerCase().includes(term))return;const btn=document.createElement('button');btn.className='chat'+(index===selected?' active':'');btn.innerHTML=`<strong>${chat.title}</strong><span>${chat.date} · ${chat.preview}</span>`;btn.onclick=()=>{selected=index;render();};chatList.appendChild(btn);});} function renderMessages(){const chat=chats[selected];messages.innerHTML='';chat.messages.forEach(([role,text])=>{const div=document.createElement('div');div.className=`msg ${role}`;div.textContent=text;messages.appendChild(div);});} function render(){renderList();renderMessages();} render();</script></body></html>
