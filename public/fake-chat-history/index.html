<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Chat History</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; }
    .app { display: grid; grid-template-columns: 310px 1fr; height: 100vh; }
    aside { background: #111827; padding: 18px; border-right: 1px solid #334155; overflow-y: auto; }
    main { display: flex; flex-direction: column; min-width: 0; }
    h1 { margin: 0 0 14px; font-size: 22px; }
    .search { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: white; margin-bottom: 14px; }
    .chat { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; color: #e5e7eb; border-radius: 14px; padding: 12px; cursor: pointer; margin-bottom: 8px; }
    .chat:hover, .chat.active { background: #1f2937; border-color: #334155; }
    .chat strong { display: block; margin-bottom: 4px; }
    .chat span { color: #9ca3af; font-size: 13px; }
    header { padding: 18px 22px; border-bottom: 1px solid #334155; background: #020617; }
    header h2 { margin: 0 0 4px; }
    header p { margin: 0; color: #9ca3af; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
    .msg { max-width: 760px; padding: 13px 15px; border-radius: 18px; line-height: 1.45; }
    .user { align-self: flex-end; background: #2563eb; }
    .bot { align-self: flex-start; background: #374151; }
    .empty { color: #9ca3af; padding: 16px; text-align: center; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 16px 22px; border-top: 1px solid #334155; background: #020617; }
    form input { padding: 13px; border-radius: 14px; border: 1px solid #334155; background: #0f172a; color: white; }
    form button { border: 0; border-radius: 14px; padding: 0 18px; background: #38bdf8; color: #082f49; font-weight: 800; cursor: pointer; }
    @media (max-width: 760px) { .app { grid-template-columns: 1fr; } aside { height: 38vh; border-right: 0; border-bottom: 1px solid #334155; } main { height: 62vh; } }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Fake Chat History</h1>
      <input id="search" class="search" placeholder="Search chats..." />
      <div id="chatList"></div>
    </aside>
    <main>
      <header><h2 id="title">No chats yet</h2><p id="meta">The daily job will add the next fake chat.</p></header>
      <section id="messages"></section>
      <form id="composer"><input id="input" placeholder="Type a fake reply..." /><button>Send</button></form>
    </main>
  </div>
  <script>
    const chats = [];
    let selected = 0;
    const chatList = document.getElementById('chatList');
    const search = document.getElementById('search');
    const title = document.getElementById('title');
    const meta = document.getElementById('meta');
    const messages = document.getElementById('messages');
    const form = document.getElementById('composer');
    const input = document.getElementById('input');
    function renderList() {
      const term = search.value.toLowerCase();
      chatList.innerHTML = '';
      chats.forEach((chat, index) => {
        if (!chat.title.toLowerCase().includes(term) && !chat.preview.toLowerCase().includes(term)) return;
        const btn = document.createElement('button');
        btn.className = 'chat' + (index === selected ? ' active' : '');
        btn.innerHTML = `<strong>${chat.title}</strong><span>${chat.date} · ${chat.preview}</span>`;
        btn.onclick = () => { selected = index; render(); };
        chatList.appendChild(btn);
      });
      if (!chatList.innerHTML) chatList.innerHTML = '<div class="empty">No fake chats yet.</div>';
    }
    function renderMessages() {
      const chat = chats[selected];
      messages.innerHTML = '';
      if (!chat) {
        title.textContent = 'No chats yet';
        meta.textContent = 'The daily job will add the next fake chat.';
        messages.innerHTML = '<div class="empty">Empty chat log.</div>';
        return;
      }
      title.textContent = chat.title;
      meta.textContent = `${chat.date} · ${chat.messages.length} fake messages`;
      chat.messages.forEach(([role, text]) => {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        messages.appendChild(div);
      });
      messages.scrollTop = messages.scrollHeight;
    }
    function render() { renderList(); renderMessages(); }
    search.oninput = renderList;
    form.onsubmit = event => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      if (!chats[selected]) chats.push({ title: 'Local Test Chat', preview: 'Temporary local-only chat', date: 'Now', messages: [] });
      chats[selected].messages.push(['user', text], ['bot', 'Fake reply saved until refresh ✅']);
      input.value = '';
      render();
    };
    render();
  </script>
</body>
</html>
