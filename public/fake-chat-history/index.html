<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Chat History</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --line:#334155; --text:#e5e7eb; --muted:#9ca3af; --accent:#38bdf8; --user:#2563eb; --bot:#374151; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .app { display:grid; grid-template-columns:330px 1fr; height:100vh; }
    aside { background:var(--panel); border-right:1px solid var(--line); padding:18px; overflow-y:auto; }
    main { display:flex; flex-direction:column; min-width:0; }
    h1 { margin:0 0 12px; font-size:22px; }
    .count { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .search { width:100%; padding:12px; border-radius:12px; border:1px solid var(--line); background:#020617; color:var(--text); margin-bottom:14px; outline:none; }
    .chat { width:100%; text-align:left; background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:8px; cursor:pointer; }
    .chat-title { display:flex; justify-content:space-between; gap:8px; font-weight:750; }
    .chat-date,.preview,.empty { color:var(--muted); font-size:13px; }
    header { padding:18px 22px; background:#020617; border-bottom:1px solid var(--line); }
    header h2 { margin:0 0 4px; }
    header p { margin:0; color:var(--muted); }
    #messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:14px; }
    .msg { max-width:760px; padding:13px 15px; border-radius:18px; line-height:1.45; white-space:pre-wrap; }
    .user { align-self:flex-end; background:var(--user); }
    .bot { align-self:flex-start; background:var(--bot); }
    .empty { padding:18px; text-align:center; }
    form { display:grid; grid-template-columns:1fr auto; gap:10px; padding:16px 22px; background:#020617; border-top:1px solid var(--line); }
    form input { padding:13px; border-radius:14px; border:1px solid var(--line); background:#0f172a; color:var(--text); outline:none; }
    form button { border:0; border-radius:14px; padding:0 18px; background:var(--accent); color:#082f49; font-weight:800; cursor:pointer; }
    @media (max-width:760px) { .app{grid-template-columns:1fr;} aside{height:30vh;border-right:0;border-bottom:1px solid var(--line);} main{height:70vh;} .msg{max-width:92%;} }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Fake Chat History</h1>
      <div class="count" id="count"></div>
      <input id="search" class="search" placeholder="Search messages..." />
      <div id="chatList"></div>
    </aside>
    <main>
      <header><h2 id="title">Loading...</h2><p id="meta">Loading fake chat history.</p></header>
      <section id="messages"></section>
      <form id="composer"><input id="input" placeholder="Type a fake reply..." autocomplete="off" /><button type="submit">Send</button></form>
    </main>
  </div>

  <!-- AUTOMATION NOTE:
    Keep exactly ONE chat object in the chats array.
    Add new hourly AI advice by appending two message rows to chats[0].messages only:
      ['user','Any new AI tip today?'],
      ['bot','<AI tip with random emoji>']
    Do not create new chat objects. Do not replace the app shell, CSS, render functions, form handler, body, or HTML.
    Do not create or update any other fake-chat-history files.
  -->
  <script>
    // CHAT_DATA_START
    const chats = [
      {
        title: 'AI Advice Feed',
        preview: 'Ongoing single-thread AI advice chat',
        date: '2026-06-23',
        messages: [
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to list the assumptions behind its answer and identify which assumptions are most likely to be wrong. 🧩'],
          ['user','Any new AI tip today?'],
          ['bot','After getting an answer, ask AI what the strongest argument against its recommendation would be. This often surfaces blind spots. 🧠'],
          ['user','Any new AI tip today?'],
          ['bot','Give AI explicit constraints like budget, time, and priorities before asking for recommendations. Results are usually much better. 🎯'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI for counterexamples that would break its recommendation before you implement it. 🔬'],
          ['user','Any new AI tip today?'],
          ['bot','Before writing code, ask AI to generate test cases first. It often reveals edge cases and requirements you might miss. 🧪'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to provide concrete examples alongside explanations. Examples make it easier to spot gaps and turn ideas into action. 💡'],
          ['user','Any new AI tip today?'],
          ['bot','Tell AI who the answer is for before asking it to explain or recommend something. A beginner, expert, manager, or customer may need totally different wording. 🦉'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to explain the tradeoffs between two good options instead of only picking a winner. Better decisions usually come from seeing what you give up. 🌟'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to turn a good answer into a reusable template you can paste next time. It saves time and keeps your prompts consistent. 🧰'],
          ['user','Any new AI tip today?'],
          ['bot','Before using an AI answer, ask it to identify the biggest risks, unknowns, and what would change its recommendation. 🧭'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to do a quick sanity check on your plan before you start. It can catch missing steps, vague goals, and sneaky assumptions. 🦊'],
          ['user','Any new AI tip today?'],
          ['bot','When an AI answer feels too complex, ask it to rewrite the plan as the smallest useful next step. Tiny steps beat giant foggy plans. 🐢'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to turn a messy goal into a short checklist with the very next action highlighted. Checklists make big tasks less buzzy and more doable. 🐝'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to make a tiny scorecard for your options with weighted criteria. It turns vague preferences into a clearer decision. 🚀'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to include a fallback plan in case the first recommendation fails. Plan B turns surprises into smaller speed bumps. 🛟'],
          ['user','Any new AI tip today?'],
          ['bot','Ask AI to name the hidden assumption your request depends on most. Finding that one assumption can save you from confidently building on sand. 🧲']
        ]
      }
    ];
    // CHAT_DATA_END

    let selected = 0;
    const chatList = document.getElementById('chatList');
    const search = document.getElementById('search');
    const title = document.getElementById('title');
    const meta = document.getElementById('meta');
    const messages = document.getElementById('messages');
    const form = document.getElementById('composer');
    const input = document.getElementById('input');
    const count = document.getElementById('count');

    function escapeHtml(value) { return String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }

    function renderList() {
      const chat = chats[0];
      count.textContent = `${chat.messages.length} messages in 1 chat`;
      chatList.innerHTML = `<button class="chat active"><div class="chat-title"><span>${escapeHtml(chat.title)}</span><span class="chat-date">${escapeHtml(chat.date)}</span></div><div class="preview">${escapeHtml(chat.preview)}</div></button>`;
    }

    function renderMessages() {
      const chat = chats[0];
      const term = search.value.trim().toLowerCase();
      const visibleMessages = term ? chat.messages.filter(([role, text]) => role.toLowerCase().includes(term) || text.toLowerCase().includes(term)) : chat.messages;
      messages.innerHTML = '';
      title.textContent = chat.title;
      meta.textContent = `${chat.date} · ${chat.messages.length} messages · single chat thread`;
      if (!visibleMessages.length) {
        messages.innerHTML = '<div class="empty">No matching messages found.</div>';
        return;
      }
      visibleMessages.forEach(([role, text]) => {
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
        div.textContent = text;
        messages.appendChild(div);
      });
      messages.scrollTop = messages.scrollHeight;
    }

    function render() { renderList(); renderMessages(); }
    search.addEventListener('input', renderMessages);
    form.addEventListener('submit', event => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      chats[0].messages.push(['user', text], ['bot', 'Fake reply saved locally until refresh ✅']);
      input.value = '';
      render();
    });
    render();
  </script>
</body>
</html>
